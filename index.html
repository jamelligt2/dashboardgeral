<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Geral — Jamelli GT</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a;
    --surface: #141414;
    --surface2: #1c1c1c;
    --border: #252525;
    --accent: #ff6b00;
    --accent-dark: #cc5500;
    --accent-glow: rgba(255,107,0,0.15);
    --text: #f0f0f0;
    --muted: #666;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
  }

  /* HEADER */
  header {
    padding: 20px 40px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    background: rgba(10,10,10,0.96);
    backdrop-filter: blur(16px);
    z-index: 100;
  }

  .logo {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 1.2rem;
    letter-spacing: -0.5px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .logo-bar {
    width: 4px; height: 22px;
    background: var(--accent);
    border-radius: 2px;
    box-shadow: 0 0 12px var(--accent);
  }

  .stats-bar {
    display: flex;
    gap: 24px;
    font-size: 0.78rem;
    color: var(--muted);
  }
  .stats-bar strong { color: var(--accent); font-weight: 700; }

  /* HERO */
  .hero {
    padding: 48px 40px 36px;
    max-width: 1440px;
    margin: 0 auto;
  }

  .hero-label {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-size: 0.7rem;
    font-weight: 600;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 18px;
  }
  .hero-label::before {
    content: '';
    display: inline-block;
    width: 20px; height: 2px;
    background: var(--accent);
  }

  .hero h1 {
    font-family: 'Syne', sans-serif;
    font-size: clamp(2.2rem, 4.5vw, 3.8rem);
    font-weight: 800;
    line-height: 1.0;
    letter-spacing: -2px;
    margin-bottom: 14px;
  }
  .hero h1 span { color: var(--accent); }

  .hero p { color: var(--muted); font-size: 0.9rem; }

  /* CONTROLS */
  .controls {
    padding: 0 40px 24px;
    max-width: 1440px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    gap: 16px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 24px;
  }

  .search-wrap {
    position: relative;
    max-width: 360px;
  }
  .search-wrap svg {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    pointer-events: none;
  }
  .search-wrap input {
    width: 100%;
    padding: 11px 14px 11px 42px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 9px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.88rem;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .search-wrap input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-glow);
  }
  .search-wrap input::placeholder { color: var(--muted); }

  .filter-section { display: flex; flex-direction: column; gap: 8px; }
  .filter-label {
    font-size: 0.68rem;
    font-weight: 600;
    letter-spacing: 1.8px;
    text-transform: uppercase;
    color: var(--muted);
  }
  .filter-group {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }

  .filter-btn {
    padding: 7px 14px;
    border-radius: 7px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.79rem;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .filter-btn:hover { border-color: var(--accent); color: var(--text); }
  .filter-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #000;
    font-weight: 700;
  }

  /* RESULT COUNT */
  .result-count {
    padding: 0 40px 14px;
    max-width: 1440px;
    margin: 0 auto;
    font-size: 0.78rem;
    color: var(--muted);
  }
  .result-count strong { color: var(--text); }

  /* GRID */
  .grid {
    padding: 0 40px 60px;
    max-width: 1440px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(265px, 1fr));
    gap: 12px;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 11px;
    padding: 20px 20px 42px;
    cursor: pointer;
    transition: all 0.18s ease;
    text-decoration: none;
    color: inherit;
    display: flex;
    flex-direction: column;
    gap: 9px;
    position: relative;
    overflow: hidden;
  }
  .card::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 2px;
    background: var(--accent);
    transform: scaleX(0);
    transform-origin: left;
    transition: transform 0.22s ease;
  }
  .card:hover {
    border-color: #333;
    transform: translateY(-2px);
    box-shadow: 0 6px 24px rgba(0,0,0,0.4);
    background: #181818;
  }
  .card:hover::after { transform: scaleX(1); }
  .card:hover .card-arrow { transform: translate(3px,-3px); color: var(--accent); }

  .card-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .card-icon {
    width: 36px; height: 36px;
    border-radius: 8px;
    background: #1e1e1e;
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1rem;
    flex-shrink: 0;
  }

  .client-name {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 0.98rem;
  }

  .campaign-name {
    font-size: 0.78rem;
    color: var(--muted);
  }

  .tags {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
  }

  .tag {
    padding: 3px 9px;
    border-radius: 5px;
    font-size: 0.68rem;
    font-weight: 600;
    letter-spacing: 0.3px;
  }

  .tag-form   { background: #1c180a; color: #d4a830; border: 1px solid #2e280a; }
  .tag-conv   { background: #180a10; color: #e0507a; border: 1px solid #2e1020; }
  .tag-perp   { background: #1c0e00; color: #ff6b00; border: 1px solid #301800; }
  .tag-lanc   { background: #080e1c; color: #5c8afc; border: 1px solid #0e1a30; }
  .tag-google { background: #081408; color: #52c96e; border: 1px solid #0e2010; }
  .tag-speed  { background: #1c0808; color: #fc5c5c; border: 1px solid #300e0e; }

  .card-arrow {
    position: absolute;
    bottom: 16px;
    right: 18px;
    color: var(--muted);
    font-size: 0.95rem;
    transition: transform 0.18s, color 0.18s;
  }

  /* EMPTY */
  .empty {
    grid-column: 1/-1;
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
  }

  @media (max-width: 600px) {
    header, .hero, .controls, .grid, .result-count { padding-left: 18px; padding-right: 18px; }
    .hero { padding-top: 32px; }
    .stats-bar { display: none; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-bar"></div>
    Jamelli GT — Dashboards
  </div>
  <div class="stats-bar">
    <span>Clientes: <strong id="totalClients">0</strong></span>
    <span>Dashboards: <strong id="totalDash">0</strong></span>
    <span>Exibindo: <strong id="totalShowing">0</strong></span>
  </div>
</header>

<section class="hero">
  <div class="hero-label">Central de Resultados</div>
  <h1>Dashboard <span>Geral</span></h1>
  <p>Todos os clientes e campanhas em um só lugar.</p>
</section>

<div class="controls">
  <div class="search-wrap">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input type="text" id="search" placeholder="Buscar cliente ou campanha...">
  </div>

  <div class="filter-section">
    <div class="filter-label">Tipo de Campanha</div>
    <div class="filter-group" id="typeFilters">
      <button class="filter-btn active" data-type="all">Todos</button>
      <button class="filter-btn" data-type="formulario">📋 Formulário</button>
      <button class="filter-btn" data-type="conversa">💬 Conversa</button>
      <button class="filter-btn" data-type="perpetuo">🔄 Perpétuo</button>
      <button class="filter-btn" data-type="lancamento">🚀 Lançamento</button>
      <button class="filter-btn" data-type="google">🔍 Google Ads</button>
      <button class="filter-btn" data-type="speed">⚡ Speed to Lead</button>
    </div>
  </div>

  <div class="filter-section">
    <div class="filter-label">Cliente</div>
    <div class="filter-group" id="clientFilters"></div>
  </div>
</div>

<div class="result-count"><strong id="countText">0</strong> dashboards encontrados</div>

<div class="grid" id="grid"></div>

<script>
const BASE = 'https://dash.jamelligt.com.br';

const dashboards = [
  { client: 'Ana',          campaign: 'Aula Pós',        folder: 'Ana-aulao-pos',          types: ['lancamento'], icon: '🎓' },
  { client: 'Geize',        campaign: 'Traços Revelados', folder: 'Geize-tracos-revelados', types: ['perpetuo'],   icon: '✨' },
  { client: 'Ivana',        campaign: 'Super Pack',       folder: 'Ivana-superpack',        types: ['perpetuo'],   icon: '📦' },
  { client: 'Ju Gomes',     campaign: 'Forms',            folder: 'Ju-gomes-forms',         types: ['formulario'], icon: '📋' },
  { client: 'Talita',       campaign: 'Rotina 30K',       folder: 'Talita-rotina-30k',      types: ['perpetuo'],   icon: '💰' },
  { client: 'Tony',         campaign: 'Speed to Lead',    folder: 'Tony-speed-to-lead',     types: ['speed'],      icon: '⚡' },
  { client: 'Adriano',      campaign: 'Maes 26',          folder: 'adriano-maes-26',        types: ['lancamento'], icon: '🚀' },
  { client: 'Bruna B',      campaign: 'Dashboard',        folder: 'bruna-b',                types: ['formulario'], icon: '📊' },
  { client: 'Bruna C',      campaign: 'Dashboard',        folder: 'bruna-c',                types: ['formulario'], icon: '📊' },
  { client: 'Bruna',        campaign: 'Dashboard',        folder: 'bruna',                  types: ['formulario'], icon: '📊' },
  { client: 'Talita',       campaign: 'CL33 — 100K',      folder: 'cl33-talita-100k',       types: ['lancamento'], icon: '🎯' },
  { client: 'Flávia',       campaign: 'CL38 — Google',    folder: 'cl38-flavia-google',     types: ['google'],     icon: '🔍' },
  { client: 'Dani',         campaign: 'ICCB',             folder: 'dani-iccb',              types: ['formulario'], icon: '🏠' },
  { client: 'Dog Urbano',   campaign: 'Dashboard',        folder: 'dog-urbano',             types: ['perpetuo'],   icon: '🐕' },
  { client: 'Elaine',       campaign: 'Dashboard',        folder: 'elaine',                 types: ['formulario'], icon: '📋' },
  { client: 'Flávia Nutri', campaign: 'Mentoria',         folder: 'flavia-nutri-mentoria',  types: ['formulario'], icon: '🥗' },
  { client: 'Gabi',         campaign: 'Forms',            folder: 'gabi-forms',             types: ['formulario'], icon: '📝' },
  { client: 'Gabi',         campaign: 'Oráculo',          folder: 'gabi-oraculo',           types: ['lancamento'], icon: '🔮' },
  { client: 'Gabi',         campaign: 'Raio-X',           folder: 'gabi-raiox',             types: ['lancamento'], icon: '⚡' },
  { client: 'Gabi',         campaign: 'União',            folder: 'gabi-uniao',             types: ['lancamento'], icon: '💜' },
  { client: 'Geize',        campaign: 'RTG',              folder: 'geize-RTG',              types: ['formulario'], icon: '📊' },
  { client: 'Geize',        campaign: 'Pack',             folder: 'geize-pack',             types: ['perpetuo'],   icon: '📦' },
  { client: 'Geize',        campaign: 'Protocolo',        folder: 'geize-protocolo',        types: ['formulario'], icon: '📋' },
  { client: 'Jessica',      campaign: 'Refúgio',          folder: 'jessica-refugio',        types: ['lancamento'], icon: '🏡' },
  { client: 'Ju Gomes',     campaign: 'Dashboard',        folder: 'ju-gomes',               types: ['formulario'], icon: '📊' },
  { client: 'Nathalia',     campaign: 'Suzigan',          folder: 'nathaliasuzigan',        types: ['formulario'], icon: '💼' },
  { client: 'Nathy',        campaign: 'Claude',           folder: 'nathy-claude',           types: ['conversa'],   icon: '💬' },
  { client: 'Nathy',        campaign: 'Form V1',          folder: 'nathy-form-v1',          types: ['formulario'], icon: '📝' },
  { client: 'Nathy',        campaign: 'Forms',            folder: 'nathy-forms',            types: ['formulario'], icon: '📝' },
  { client: 'Nathy',        campaign: 'Fotos IA',         folder: 'nathy-fotos-ia',         types: ['perpetuo'],   icon: '📸' },
  { client: 'Nathy',        campaign: 'IMM',              folder: 'nathy-imm',              types: ['lancamento'], icon: '🚀' },
  { client: 'Nathy',        campaign: 'Presencial 26',    folder: 'nathy-presencial-26',    types: ['lancamento'], icon: '🎤' },
  { client: 'Nathy',        campaign: 'Social Media',     folder: 'nathy-sm',               types: ['conversa'],   icon: '📱' },
  { client: 'Nathy',        campaign: 'Dashboard',        folder: 'nathy',                  types: ['formulario'], icon: '📊' },
  { client: 'Talita',       campaign: 'Claude',           folder: 'talita-claude',          types: ['conversa'],   icon: '💬' },
  { client: 'Talita',       campaign: 'Forms',            folder: 'talita-forms',           types: ['formulario'], icon: '📝' },
  { client: 'Tony',         campaign: 'Speed',            folder: 'tony-speed',             types: ['speed'],      icon: '⚡' },
  { client: 'Virginia',     campaign: 'Destravando',      folder: 'virginia-destravando',   types: ['lancamento'], icon: '🔓' },
];

const tagLabel = {
  formulario: ['Formulário',    'tag-form'],
  conversa:   ['Conversa',      'tag-conv'],
  perpetuo:   ['Perpétuo',      'tag-perp'],
  lancamento: ['Lançamento',    'tag-lanc'],
  google:     ['Google Ads',    'tag-google'],
  speed:      ['Speed to Lead', 'tag-speed'],
};

// Build client buttons
const allClients = [...new Set(dashboards.map(d => d.client))].sort();
const clientFilters = document.getElementById('clientFilters');

[{ label: 'Todos', value: 'all' }, ...allClients.map(c => ({ label: c, value: c }))].forEach(({ label, value }) => {
  const btn = document.createElement('button');
  btn.className = 'filter-btn' + (value === 'all' ? ' active' : '');
  btn.dataset.client = value;
  btn.textContent = label;
  clientFilters.appendChild(btn);
});

let activeType = 'all';
let activeClient = 'all';

const grid = document.getElementById('grid');
const searchInput = document.getElementById('search');

function render() {
  const q = searchInput.value.toLowerCase().trim();
  const filtered = dashboards.filter(d => {
    const matchType   = activeType === 'all'   || d.types.includes(activeType);
    const matchClient = activeClient === 'all' || d.client === activeClient;
    const matchSearch = !q || d.client.toLowerCase().includes(q) || d.campaign.toLowerCase().includes(q);
    return matchType && matchClient && matchSearch;
  });

  document.getElementById('totalClients').textContent = allClients.length;
  document.getElementById('totalDash').textContent = dashboards.length;
  document.getElementById('totalShowing').textContent = filtered.length;
  document.getElementById('countText').textContent = filtered.length;

  if (!filtered.length) {
    grid.innerHTML = `<div class="empty"><p style="font-size:2rem;margin-bottom:12px">🔍</p><p>Nenhum dashboard encontrado.</p></div>`;
    return;
  }

  grid.innerHTML = filtered.map(d => {
    const tags = d.types.map(t => `<span class="tag ${tagLabel[t][1]}">${tagLabel[t][0]}</span>`).join('');
    return `
      <a class="card" href="${BASE}/${d.folder}" target="_blank">
        <div class="card-top">
          <div class="client-name">${d.client}</div>
          <div class="card-icon">${d.icon}</div>
        </div>
        <div class="campaign-name">${d.campaign}</div>
        <div class="tags">${tags}</div>
        <span class="card-arrow">↗</span>
      </a>`;
  }).join('');
}

document.getElementById('typeFilters').addEventListener('click', e => {
  const btn = e.target.closest('.filter-btn');
  if (!btn) return;
  activeType = btn.dataset.type;
  document.querySelectorAll('#typeFilters .filter-btn').forEach(b => b.classList.toggle('active', b === btn));
  render();
});

clientFilters.addEventListener('click', e => {
  const btn = e.target.closest('.filter-btn');
  if (!btn) return;
  activeClient = btn.dataset.client;
  document.querySelectorAll('#clientFilters .filter-btn').forEach(b => b.classList.toggle('active', b === btn));
  render();
});

searchInput.addEventListener('input', render);

render();
</script>
</body>
</html>
