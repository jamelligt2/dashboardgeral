<script>
// ╔══════════════════════════════════════════════════════════════════╗
// ║           CONFIGURAÇÃO DO CLIENTE — EDITE APENAS AQUI           ║
// ╚══════════════════════════════════════════════════════════════════╝
const CONFIG = {
  CLIENTE:          'Ivana Souza',
  PRODUTO:          '5 IAs',
  ANO:              '2026',

  SHEET_ID:         '1w4oXdwI3s-Z_LpBCIsqW0Ctt1ekNcTyWir9W-4rr6J8',
  GERENCIADOR_SHEET:'Gerenciador',
  WEBHOOK_SHEET:    'Webhook',
  DATA_MINIMA:      '2026-06-22',

  PRODUTO_NOME:         '5 ias',     // col Produto contém isto (case-insensitive)
  PRODUTO_PRECO_MINIMO: 0,

  USA_TX_ROOT: true,                 // planilha tem transaction_root
  VALORES_EM_CENTAVOS: false,        // Faturado em reais (ajuste p/ true se Kiwify/centavos)

  AUTO_REFRESH_MS: 2 * 60 * 60 * 1000,  // atualização automática a cada 2h

  // Colunas do Webhook (0-based)
  W: {
    data:0, produto:1, status:3, cliente:4, email:5,
    fatTotal:6, fatPrincipal:7, fatOB:8, txRoot:9,
    utmSource:12, utmMedium:13, utmCampaign:14, utmContent:15,
  },

  // Colunas do Gerenciador (0-based) — padrão Stract
  G: {
    date:0, campaign:1, adset:2, ad:3, link:4, inv:5, reach:6, imp:7,
    cliques:8, pv:9, ck:10, statusCampaign:11, statusAdset:12, statusAd:13,
  },

  STATUS_APROVADO: ['APPROVED','COMPLETE','CONFIRMED','PAGO','PAID','APROVADO'],

  // Classificação QUENTE x FRIO pelo nome do conjunto de anúncios
  QUENTE_KEYS: ['rmkt','remarket','quente','engaj','envolv','retarget','aquec',
                'lookalike','lal','visitante','base','seguidor'],
};
const SHEET_ID=CONFIG.SHEET_ID, GERENCIADOR_SHEET=CONFIG.GERENCIADOR_SHEET,
      WEBHOOK_SHEET=CONFIG.WEBHOOK_SHEET, DATA_MINIMA=CONFIG.DATA_MINIMA,
      G=CONFIG.G, W=CONFIG.W;

document.addEventListener('DOMContentLoaded',()=>{
  document.title=CONFIG.PRODUTO+' · '+CONFIG.CLIENTE+' — Jamelli GT';
  const b=document.getElementById('brand-title'); if(b)b.textContent='📦 '+CONFIG.PRODUTO+' · '+CONFIG.CLIENTE;
  const s=document.getElementById('brand-subtitle'); if(s)s.textContent='Dashboard de Performance — Perpétuo · Jamelli GT · '+CONFIG.ANO;
});

// ─────────────────────────── ESTADO GLOBAL ───────────────────────────
let GROWS=[], SALES=[], DIAS=[];
let curFrom=null, curTo=null;
let criStatusFilter='todos', criSortKey='inv', criAudFilter='todos';
let pubAudFilter='todos', pubSortKey='inv';
const CHARTS={};

// ─────────────────────────── HELPERS ───────────────────────────
function classAud(name){
  const n=(name||'').toLowerCase();
  return CONFIG.QUENTE_KEYS.some(k=>n.includes(k))?'quente':'frio';
}
function num(v){
  if(v==null) return 0;
  let s=String(v).trim();
  if(!s||s==='-'||s==='—') return 0;
  s=s.replace(/r\$/ig,'').replace(/\s/g,'');
  if(s.indexOf(',')>-1){ s=s.replace(/\./g,'').replace(',','.'); }
  const f=parseFloat(s.replace(/[^0-9.\-]/g,''));
  return isNaN(f)?0:f;
}
function money(v){
  if(!v) return '—';
  return 'R$ '+v.toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});
}
function int(v){ return (v||0).toLocaleString('pt-BR'); }
function pct(v){ if(!isFinite(v)||!v) return '—'; return v.toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2})+'%'; }
function roas(v){ if(!isFinite(v)||!v) return '—'; return v.toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2})+'x'; }
function isPaused(s){ return String(s||'').toUpperCase().includes('PAUSED'); }
function rowActive(r){
  const sc=r[G.statusCampaign],sa=r[G.statusAdset],sad=r[G.statusAd];
  if(isPaused(sc)||isPaused(sa)||isPaused(sad)) return false;
  return (String(sc||'')!=='')||(String(sa||'')!=='')||(String(sad||'')!=='');
}
const isTrafego=s=>(s.utmSource||'').toLowerCase().replace(/[\s_-]/g,'')==='metaads';

function parseCSV(text){
  const rows=[]; let row=[], field='', inq=false;
  for(let i=0;i<text.length;i++){
    const c=text[i];
    if(inq){
      if(c==='"'){ if(text[i+1]==='"'){field+='"';i++;} else inq=false; }
      else field+=c;
    } else {
      if(c==='"') inq=true;
      else if(c===','){ row.push(field); field=''; }
      else if(c==='\n'){ row.push(field); rows.push(row); row=[]; field=''; }
      else if(c==='\r'){}
      else field+=c;
    }
  }
  if(field!==''||row.length){ row.push(field); rows.push(row); }
  return rows;
}

async function fetchSheetCSV(sheetName){
  const url=`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(sheetName)}`;
  const controller=new AbortController();
  const timeout=setTimeout(()=>controller.abort(),20000);
  try{
    const resp=await fetch(url,{signal:controller.signal});
    clearTimeout(timeout);
    if(!resp.ok) throw new Error(`Planilha "${sheetName}": HTTP ${resp.status}. Verifique se está pública.`);
    const text=await resp.text();
    if(text.includes('Signin')||text.includes('accounts.google'))
      throw new Error(`Planilha "${sheetName}" requer login. Defina como pública.`);
    return text;
  }catch(e){
    clearTimeout(timeout);
    if(e.name==='AbortError') throw new Error(`Timeout ao carregar "${sheetName}".`);
    throw e;
  }
}

// ─────────────────────── PROCESSAMENTO ───────────────────────
function processSales(rows){
  const groups={};
  for(const r of rows){
    const data=String(r[W.data]||'').slice(0,10);
    if(!data||data<DATA_MINIMA) continue;
    const status=String(r[W.status]||'').toUpperCase().trim();
    if(!CONFIG.STATUS_APROVADO.includes(status)) continue;
    const key=CONFIG.USA_TX_ROOT
      ? (String(r[W.txRoot]||'').trim()||(String(r[W.email]||'')+'|'+data))
      : (String(r[W.email]||'')+'|'+data);
    (groups[key]=groups[key]||[]).push(r);
  }
  const sales=[];
  for(const key in groups){
    const lines=groups[key];
    const principal=lines.find(r=>
      String(r[W.produto]||'').toLowerCase().includes(CONFIG.PRODUTO_NOME)
      && num(r[W.fatTotal])>=CONFIG.PRODUTO_PRECO_MINIMO);
    if(!principal) continue;
    let fp=0, fo=0; const cent=CONFIG.VALORES_EM_CENTAVOS?100:1;
    for(const r of lines){
      const isP=String(r[W.produto]||'').toLowerCase().includes(CONFIG.PRODUTO_NOME);
      const vp=num(r[W.fatPrincipal])/cent, vo=num(r[W.fatOB])/cent, vt=num(r[W.fatTotal])/cent;
      if(isP){ fp+=(vp||vt); fo+=vo; } else { fo+=(vo||vt); }
    }
    sales.push({
      data:String(principal[W.data]||'').slice(0,10),
      nome:principal[W.cliente]||'—', email:principal[W.email]||'',
      fatPrincipal:fp, fatOB:fo, fatTotal:fp+fo,
      utmSource:principal[W.utmSource]||'', utmMedium:principal[W.utmMedium]||'',
      utmCampaign:principal[W.utmCampaign]||'', utmContent:principal[W.utmContent]||'',
    });
  }
  return sales.sort((a,b)=>b.data.localeCompare(a.data));
}

function gRowsInRange(from,to){
  return GROWS.filter(r=>{
    const d=String(r[G.date]||'').slice(0,10);
    if(!d) return false;
    if(from&&d<from) return false;
    if(to&&d>to) return false;
    return true;
  });
}
function salesInRange(from,to){
  return SALES.filter(s=>(!from||s.data>=from)&&(!to||s.data<=to));
}

function aggG(rows){
  let inv=0,reach=0,imp=0,clk=0,pv=0,ck=0;
  for(const r of rows){
    inv+=num(r[G.inv]); reach+=num(r[G.reach]); imp+=num(r[G.imp]);
    clk+=num(r[G.cliques]); pv+=num(r[G.pv]); ck+=num(r[G.ck]);
  }
  return {inv,reach,imp,clk,pv,ck};
}

// ─────────── CRIATIVOS / PÚBLICOS recalculados por período ───────────
function buildCriPubMaps(from,to){
  const gr=gRowsInRange(from,to);
  const fSales=salesInRange(from,to);
  const cri={};
  for(const r of gr){
    const ad=String(r[G.ad]||'').trim()||'(sem nome)';
    const adset=String(r[G.adset]||'');
    const o=cri[ad]||(cri[ad]={nome:ad,inv:0,reach:0,imp:0,clk:0,pv:0,ck:0,
      vendas:0,fat:0,ativo:false,link:'',aud:classAud(adset),adset:adset});
    o.inv+=num(r[G.inv]); o.reach+=num(r[G.reach]); o.imp+=num(r[G.imp]);
    o.clk+=num(r[G.cliques]); o.pv+=num(r[G.pv]); o.ck+=num(r[G.ck]);
    if(rowActive(r)) o.ativo=true;
    if(!o.link&&r[G.link]) o.link=r[G.link];
    o.aud=classAud(adset);
  }
  const pub={};
  for(const r of gr){
    const ad=String(r[G.adset]||'').trim()||'(sem nome)';
    const o=pub[ad]||(pub[ad]={nome:ad,inv:0,reach:0,imp:0,clk:0,pv:0,ck:0,
      vendas:0,fat:0,ativo:false,aud:classAud(ad)});
    o.inv+=num(r[G.inv]); o.reach+=num(r[G.reach]); o.imp+=num(r[G.imp]);
    o.clk+=num(r[G.cliques]); o.pv+=num(r[G.pv]); o.ck+=num(r[G.ck]);
    if(rowActive(r)) o.ativo=true;
  }
  for(const s of fSales){
    if(!isTrafego(s)) continue;
    const c=String(s.utmContent||'').trim();
    const m=String(s.utmMedium||'').trim();
    if(cri[c]){ cri[c].vendas++; cri[c].fat+=s.fatTotal; }
    if(pub[m]){ pub[m].vendas++; pub[m].fat+=s.fatTotal; }
  }
  return {cri:Object.values(cri),pub:Object.values(pub)};
}

function ctr(o){ return o.imp? o.clk/o.imp*100 : 0; }
function cpc(o){ return o.clk? o.inv/o.clk : 0; }
function cpm(o){ return o.imp? o.inv/o.imp*1000 : 0; }

// ─────────────────────────── RENDER ───────────────────────────
function render(){
  const from=curFrom,to=curTo;
  const gr=gRowsInRange(from,to);
  const sales=salesInRange(from,to);
  const g=aggG(gr);

  const trafego=sales.filter(isTrafego);
  const organico=sales.filter(s=>!isTrafego(s));
  const fatTraf=trafego.reduce((a,s)=>a+s.fatTotal,0);
  const fatOrg=organico.reduce((a,s)=>a+s.fatTotal,0);
  const obTraf=trafego.reduce((a,s)=>a+s.fatOB,0);
  const obOrg=organico.reduce((a,s)=>a+s.fatOB,0);
  const nObTraf=trafego.filter(s=>s.fatOB>0).length;
  const nObOrg=organico.filter(s=>s.fatOB>0).length;
  const fatTotal=fatTraf+fatOrg;

  renderTrafego(g,sales,trafego,organico,{fatTraf,fatOrg,obTraf,obOrg,nObTraf,nObOrg,fatTotal});
  renderVisao(g,sales,gr,fatTotal,trafego,organico);
  renderCriativos(from,to);
  renderPublicos(from,to);
  renderSemanal();
  renderMensal();
}

function kpi(label,value,cls,sub){
  return `<div class="kpi-card"><div class="kpi-label">${label}</div>
    <div class="kpi-value ${cls||''}">${value}</div>${sub?`<div class="kpi-sub">${sub}</div>`:''}</div>`;
}

function renderTrafego(g,sales,trafego,organico,x){
  const roasT=g.inv? x.fatTraf/g.inv : 0;
  const cac=trafego.length? g.inv/trafego.length : 0;
  const ticket=sales.length? x.fatTotal/sales.length : 0;
  let html=`<div class="kpi-grid">
    ${kpi('Investimento (Meta)',money(g.inv),'orange')}
    ${kpi('Fat. Tráfego',money(x.fatTraf),'green')}
    ${kpi('Fat. Orgânico',money(x.fatOrg),'yellow')}
    ${kpi('ROAS Tráfego',roas(roasT),'orange')}
    ${kpi('Vendas Tráfego',trafego.length+(x.nObTraf?` <span style="font-size:12px" class="orange">+${x.nObTraf} OB</span>`:''),'green')}
    ${kpi('Vendas Orgânico',organico.length+(x.nObOrg?` <span style="font-size:12px" class="orange">+${x.nObOrg} OB</span>`:''),'yellow')}
    ${kpi('Fat. OB Tráfego',money(x.obTraf),'orange')}
    ${kpi('Fat. OB Orgânico',money(x.obOrg),'orange')}
    ${kpi('CAC',money(cac),'red')}
    ${kpi('Ticket Médio',money(ticket),'')}
    ${kpi('Cliques',int(g.clk),'')}
    ${kpi('Impressões',int(g.imp),'')}
    ${kpi('CPC',money(cpc(g)),'')}
    ${kpi('CPM',money(cpm(g)),'')}
  </div>`;

  const f_clk=g.clk, f_pv=g.pv, f_ck=g.ck, f_compras=sales.length;
  const mx=Math.max(f_clk,f_pv,f_ck,f_compras,1);
  const bar=(lbl,v)=>`<div class="funil-bar-wrap"><div class="funil-label"><span>${lbl}</span><span>${int(v)}</span></div>
    <div class="funil-bar-bg"><div class="funil-bar-fill" style="width:${(v/mx*100).toFixed(1)}%"></div></div></div>`;
  html+=`<div class="sec-title">Funil de Conversão</div><div class="funil-section">
    <div>${bar('Cliques',f_clk)}${bar('Page View',f_pv)}${bar('Checkouts',f_ck)}${bar('Compras',f_compras)}</div>
    <div class="taxa-grid">
      <div class="taxa-item"><span>Clique → Page View</span><span class="taxa-val">${pct(f_clk?f_pv/f_clk*100:0)}</span></div>
      <div class="taxa-item"><span>Page View → Checkout</span><span class="taxa-val">${pct(f_pv?f_ck/f_pv*100:0)}</span></div>
      <div class="taxa-item"><span>Checkout → Compra</span><span class="taxa-val">${pct(f_ck?f_compras/f_ck*100:0)}</span></div>
      <div class="taxa-item"><span>Clique → Compra</span><span class="taxa-val">${pct(f_clk?f_compras/f_clk*100:0)}</span></div>
    </div></div>`;

  html+=`<div class="sec-title">Vendas (compradores)</div>`;
  if(sales.length){
    html+=`<div class="sales-scroll">`+sales.map(s=>{
      const t=isTrafego(s);
      return `<div class="sale-card ${t?'trafego':'organico'}">
        <div class="sale-top"><span class="sale-name">${t?'✅':'⭐'} ${s.nome}</span><span class="sale-val">${money(s.fatTotal)}</span></div>
        <div class="sale-meta">📅 ${s.data}<br>${t?'Tráfego pago (meta_ads)':'Orgânico'}${s.utmContent?'<br>🎯 '+s.utmContent:''}${s.utmMedium?'<br>👥 '+s.utmMedium:''}</div>
        ${s.fatOB>0?`<div class="sale-ob">🛒 OB: ${money(s.fatOB)}</div>`:''}
      </div>`;
    }).join('')+`</div>`;
  } else {
    html+=`<div class="empty-note">Nenhuma venda registrada no período (aba Webhook ainda sem lançamentos a partir de ${DATA_MINIMA}).<br>Os investimentos e o funil acima já refletem os dados do Gerenciador.</div>`;
  }
  document.getElementById('tab-trafego').innerHTML=html;
}

function renderVisao(g,sales,gr,fatTotal,trafego,organico){
  const roasTot=g.inv? fatTotal/g.inv : 0;
  const cac=sales.length? g.inv/sales.length : 0;
  const ticket=sales.length? fatTotal/sales.length : 0;
  let html=`<div class="kpi-grid">
    ${kpi('Investimento',money(g.inv),'orange')}
    ${kpi('Fat. Total',money(fatTotal),'green')}
    ${kpi('ROAS Total',roas(roasTot),'orange')}
    ${kpi('Vendas Total',sales.length,'green')}
    ${kpi('Tráfego',trafego.length,'green')}
    ${kpi('Orgânicas',organico.length,'yellow')}
    ${kpi('Ticket Médio',money(ticket),'')}
    ${kpi('CAC Total',money(cac),'red')}
  </div>`;

  const byDay={};
  for(const r of gr){
    const d=String(r[G.date]||'').slice(0,10); if(!d) continue;
    const o=byDay[d]||(byDay[d]={inv:0});
    o.inv+=num(r[G.inv]);
  }
  for(const s of sales){
    const o=byDay[s.data]||(byDay[s.data]={inv:0});
    o.fat=(o.fat||0)+s.fatTotal;
    o.tot=(o.tot||0)+1;
    if(isTrafego(s)) o.traf=(o.traf||0)+1; else o.org=(o.org||0)+1;
  }
  const days=Object.keys(byDay).sort();
  html+=`<div class="sec-title">Desempenho dia a dia</div><div class="tbl-wrap"><table>
    <thead><tr><th>Data</th><th>Invest.</th><th>Fat. Total</th><th>ROAS</th><th>Compras</th><th>Tráfego</th><th>Orgânicas</th><th>Ticket Médio</th><th>CAC</th></tr></thead><tbody>`;
  for(const d of days){
    const o=byDay[d]; const fat=o.fat||0, tot=o.tot||0;
    html+=`<tr><td>${d}</td><td>${money(o.inv)}</td><td>${money(fat)}</td>
      <td>${roas(o.inv?fat/o.inv:0)}</td><td>${tot||'—'}</td><td>${o.traf||'—'}</td><td>${o.org||'—'}</td>
      <td>${tot?money(fat/tot):'—'}</td><td>${(o.traf&&o.inv)?money(o.inv/o.traf):'—'}</td></tr>`;
  }
  if(!days.length) html+=`<tr><td colspan="9" style="text-align:center;color:rgba(255,255,255,.4)">Sem dados no período</td></tr>`;
  html+=`</tbody></table></div>`;
  document.getElementById('tab-visao').innerHTML=html;
}

function renderCriativos(from,to){
  const {cri}=buildCriPubMaps(from,to);
  let list=cri.slice();
  if(criStatusFilter==='ativos') list=list.filter(c=>c.ativo);
  else if(criStatusFilter==='inativos') list=list.filter(c=>!c.ativo);
  if(criAudFilter!=='todos') list=list.filter(c=>c.aud===criAudFilter);
  const sortFns={inv:(a,b)=>b.inv-a.inv,ctr:(a,b)=>ctr(b)-ctr(a),
    cpc:(a,b)=>(cpc(a)||9e9)-(cpc(b)||9e9),roas:(a,b)=>(b.fat/(b.inv||1))-(a.fat/(a.inv||1)),
    vendas:(a,b)=>b.vendas-a.vendas};
  list.sort(sortFns[criSortKey]||sortFns.inv);

  const sb=(k,l)=>`<button class="cri-sort-btn ${criSortKey===k?'active':''}" onclick="setCriSort('${k}')">${l}</button>`;
  const stb=(k,l)=>`<button class="cri-status-btn ${criStatusFilter===k?'active':''}" onclick="setCriStatus('${k}')">${l}</button>`;
  const ab=(k,l)=>`<button class="cri-filter-btn ${criAudFilter===k?'active':''}" onclick="setCriAud('${k}')">${l}</button>`;

  let html=`<div class="cri-filterbar">${stb('todos','Todos')}${stb('ativos','Ativos')}${stb('inativos','Inativos')}
    <span style="width:8px"></span>${ab('todos','🌡️ Todos')}${ab('quente','🔥 Quente')}${ab('frio','❄️ Frio')}
    <span class="cri-sort-label" style="margin-left:auto">Ordenar:</span>
    ${sb('inv','Investimento')}${sb('ctr','CTR')}${sb('cpc','CPC')}${sb('roas','ROAS')}${sb('vendas','Vendas')}</div>`;

  html+=`<div class="cri-grid">`+list.map(c=>{
    const r=c.fat/(c.inv||1);
    return `<div class="cri-card ${c.ativo?'ativo':''}">
      <div class="cri-card-header"><span class="cri-name">${c.nome}</span>
        <span><span class="cri-badge ${c.ativo?'ativo':'inativo'}">${c.ativo?'Ativo':'Inativo'}</span>
        <span class="cri-tag ${c.aud}">${c.aud==='quente'?'🔥 Quente':'❄️ Frio'}</span></span></div>
      <div class="cri-metrics">
        <div class="cri-metric"><span class="cri-metric-label">Investido</span><span class="cri-metric-val hl">${money(c.inv)}</span></div>
        <div class="cri-metric"><span class="cri-metric-label">Vendas</span><span class="cri-metric-val">${c.vendas||'—'}</span></div>
        <div class="cri-metric"><span class="cri-metric-label">CTR</span><span class="cri-metric-val">${pct(ctr(c))}</span></div>
        <div class="cri-metric"><span class="cri-metric-label">CPC</span><span class="cri-metric-val">${money(cpc(c))}</span></div>
        <div class="cri-metric"><span class="cri-metric-label">Cliques</span><span class="cri-metric-val">${int(c.clk)}</span></div>
        <div class="cri-metric"><span class="cri-metric-label">ROAS</span><span class="cri-metric-val">${roas(r)}</span></div>
      </div>
      ${c.link?`<a class="cri-link" href="${c.link}" target="_blank">🔗 ${c.link}</a>`:''}
    </div>`;
  }).join('')+`</div>`;

  if(!list.length) html+=`<div class="empty-note">Nenhum criativo no filtro selecionado.</div>`;

  html+=`<div class="sec-title">Tabela de Criativos</div><div class="tbl-wrap"><table>
    <thead><tr><th>Criativo</th><th>Público</th><th>Status</th><th>Invest.</th><th>Impr.</th><th>Cliques</th><th>CTR</th><th>CPC</th><th>Vendas</th><th>ROAS</th></tr></thead><tbody>`;
  for(const c of list){
    html+=`<tr><td>${c.nome}</td><td>${c.aud==='quente'?'🔥 Quente':'❄️ Frio'}</td>
      <td>${c.ativo?'<span class="green">●</span> Ativo':'<span style="color:rgba(255,255,255,.3)">●</span> Inativo'}</td>
      <td>${money(c.inv)}</td><td>${int(c.imp)}</td><td>${int(c.clk)}</td><td>${pct(ctr(c))}</td>
      <td>${money(cpc(c))}</td><td>${c.vendas||'—'}</td><td>${roas(c.fat/(c.inv||1))}</td></tr>`;
  }
  html+=`</tbody></table></div>`;
  document.getElementById('tab-criativos').innerHTML=html;
}

function aggPeriod(keyFn){
  const map={};
  for(const r of GROWS){
    const d=String(r[G.date]||'').slice(0,10); if(!d||d<DATA_MINIMA) continue;
    const k=keyFn(d); const o=map[k]||(map[k]={k,inv:0,imp:0,clk:0,fat:0,vendas:0});
    o.inv+=num(r[G.inv]); o.imp+=num(r[G.imp]); o.clk+=num(r[G.cliques]);
  }
  for(const s of SALES){
    if(s.data<DATA_MINIMA) continue;
    const k=keyFn(s.data); const o=map[k]||(map[k]={k,inv:0,imp:0,clk:0,fat:0,vendas:0});
    o.fat+=s.fatTotal; o.vendas++;
  }
  return Object.values(map).sort((a,b)=>a.k.localeCompare(b.k));
}
function isoWeek(dStr){
  const d=new Date(dStr+'T00:00:00');
  const dt=new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate()));
  const day=dt.getUTCDay()||7; dt.setUTCDate(dt.getUTCDate()+4-day);
  const ys=new Date(Date.UTC(dt.getUTCFullYear(),0,1));
  const wn=Math.ceil((((dt-ys)/86400000)+1)/7);
  return dt.getUTCFullYear()+'-S'+String(wn).padStart(2,'0');
}

function renderPeriodTable(rows,label){
  let html=`<div class="tbl-wrap"><table><thead><tr><th>${label}</th><th>Invest.</th><th>Impr.</th><th>Cliques</th><th>CTR</th><th>CPC</th><th>Fat.</th><th>Vendas</th><th>ROAS</th></tr></thead><tbody>`;
  for(const o of rows){
    html+=`<tr><td>${o.k}</td><td>${money(o.inv)}</td><td>${int(o.imp)}</td><td>${int(o.clk)}</td>
      <td>${pct(o.imp?o.clk/o.imp*100:0)}</td><td>${money(o.clk?o.inv/o.clk:0)}</td>
      <td>${money(o.fat)}</td><td>${o.vendas||'—'}</td><td>${roas(o.inv?o.fat/o.inv:0)}</td></tr>`;
  }
  if(!rows.length) html+=`<tr><td colspan="9" style="text-align:center;color:rgba(255,255,255,.4)">Sem dados</td></tr>`;
  html+=`</tbody></table></div>`;
  return html;
}
function drawChart(id,labels,inv,ctrArr){
  const ctx=document.getElementById(id); if(!ctx) return;
  if(CHARTS[id]) CHARTS[id].destroy();
  CHARTS[id]=new Chart(ctx,{type:'bar',
    data:{labels,datasets:[
      {label:'Investimento',data:inv,backgroundColor:'rgba(255,107,43,0.85)',yAxisID:'y',order:2},
      {label:'CTR %',data:ctrArr,type:'line',borderColor:'rgba(255,183,55,0.95)',backgroundColor:'rgba(255,183,55,0.3)',yAxisID:'y1',order:1,tension:.3}
    ]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{labels:{color:'rgba(255,255,255,.6)',font:{size:10}}}},
      scales:{
        x:{ticks:{color:'rgba(255,255,255,.45)',font:{size:9}},grid:{display:false}},
        y:{position:'left',ticks:{color:'rgba(255,255,255,.45)',font:{size:9}},grid:{color:'rgba(255,255,255,.05)'}},
        y1:{position:'right',ticks:{color:'rgba(255,183,55,.6)',font:{size:9}},grid:{display:false}}
      }}});
}

function renderSemanal(){
  const rows=aggPeriod(isoWeek);
  let html=`<div class="sec-title">Semana a Semana</div>${renderPeriodTable(rows,'Semana')}
    <div class="chart-grid-2x2" style="grid-template-columns:1fr"><div class="chart-card"><h4>Investimento × CTR por semana</h4><canvas id="chart-sem"></canvas></div></div>`;
  document.getElementById('tab-semanal').innerHTML=html;
  drawChart('chart-sem',rows.map(r=>r.k),rows.map(r=>+r.inv.toFixed(2)),rows.map(r=>+(r.imp?r.clk/r.imp*100:0).toFixed(2)));
}
function renderMensal(){
  const rows=aggPeriod(d=>d.slice(0,7));
  let html=`<div class="sec-title">Mês a Mês</div>${renderPeriodTable(rows,'Mês')}
    <div class="chart-grid-2x2" style="grid-template-columns:1fr"><div class="chart-card"><h4>Investimento × CTR por mês</h4><canvas id="chart-mes"></canvas></div></div>`;
  document.getElementById('tab-mensal').innerHTML=html;
  drawChart('chart-mes',rows.map(r=>r.k),rows.map(r=>+r.inv.toFixed(2)),rows.map(r=>+(r.imp?r.clk/r.imp*100:0).toFixed(2)));
}

  document.querySelectorAll('.content').forEach(c=>c.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
  el.classList.add('active');
}

function setPubSort(k){pubSortKey=k;renderPublicos(curFrom,curTo);}

function onDateChange(){
  curFrom=document.getElementById('dateFrom').value||null;
  curTo=document.getElementById('dateTo').value||null;
  document.querySelectorAll('.period-bar .preset-btn').forEach(b=>{if(b.textContent.match(/\d+d|Tudo/))b.classList.remove('active')});
  updateRangeInfo(); render();
}
function setPreset(days,btn){
  document.querySelectorAll('.period-bar .preset-btn').forEach(b=>{if(b.textContent.match(/\d+d|Tudo/))b.classList.remove('active')});
  if(btn) btn.classList.add('active');
  const allDates=[...DIAS.map(d=>d.data),...SALES.map(s=>s.data)].filter(Boolean).sort();
  if(!allDates.length){updateRangeInfo();return;}
  const first=allDates[0], last=allDates[allDates.length-1];
  if(days==='all'){ curFrom=first; curTo=last; }
  else{
    const ld=new Date(last+'T00:00:00'); const fd=new Date(ld); fd.setDate(fd.getDate()-(days-1));
    const fstr=fd.toISOString().slice(0,10);
    curFrom=fstr<first?first:fstr; curTo=last;
  }
  document.getElementById('dateFrom').value=curFrom;
  document.getElementById('dateTo').value=curTo;
  updateRangeInfo(); render();
}
function updateRangeInfo(){
  const el=document.getElementById('range-info');
  if(el) el.textContent=(curFrom||'—')+' → '+(curTo||'—');
}

// ─────────────────────────── CARGA ───────────────────────────
async function loadData(silent){
  const ov=document.getElementById('loading-overlay');
  if(!silent&&ov){ov.style.display='flex';document.getElementById('loading-msg').textContent='Conectando com a planilha...';}
  try{
    const [gTxt,wTxt]=await Promise.all([fetchSheetCSV(GERENCIADOR_SHEET),fetchSheetCSV(WEBHOOK_SHEET)]);
    const gAll=parseCSV(gTxt), wAll=parseCSV(wTxt);
    GROWS=gAll.slice(1).filter(r=>r.length>3&&String(r[G.date]||'').trim());
    const wRows=wAll.slice(1).filter(r=>r.length>3);
    SALES=processSales(wRows);
    const dset={};
    for(const r of GROWS){const d=String(r[G.date]||'').slice(0,10); if(d&&d>=DATA_MINIMA) dset[d]=1;}
    DIAS=Object.keys(dset).sort().map(d=>({data:d}));
    const allDates=[...DIAS.map(d=>d.data),...SALES.map(s=>s.data)].filter(Boolean).sort();
    curFrom=allDates[0]||DATA_MINIMA; curTo=allDates[allDates.length-1]||DATA_MINIMA;
    document.getElementById('dateFrom').value=curFrom;
    document.getElementById('dateTo').value=curTo;
    updateRangeInfo();
    render();
    const now=new Date();
    document.getElementById('refresh-info').textContent='Atualizado '+now.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'})+' · auto 2h';
    if(ov) ov.style.display='none';
  }catch(e){
    if(ov){ov.style.display='flex';document.getElementById('loading-msg').innerHTML='⚠️ '+e.message+'<br><br><button class="preset-btn" onclick="loadData()">Tentar novamente</button>';}
  }
}

// Auto-refresh a cada 2h (silencioso, preservando janela de datas manual)
setInterval(()=>{
  const f=curFrom,t=curTo;
  const btnAll=document.getElementById('btn-all');
  const allActive=btnAll&&btnAll.classList.contains('active');
  loadData(true).then(()=>{
    if(!allActive){
      curFrom=f;curTo=t;
      document.getElementById('dateFrom').value=f||'';
      document.getElementById('dateTo').value=t||'';
      updateRangeInfo();render();
    }
  });
}, CONFIG.AUTO_REFRESH_MS);

loadData();
</script>
