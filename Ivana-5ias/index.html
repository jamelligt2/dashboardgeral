function classAud(name){
  const n=(name||'').toLowerCase();
  return CONFIG.QUENTE_KEYS.some(k=>n.includes(k))?'quente':'frio';
}
function num(v){
  if(v==null) return 0;
  let s=String(v).trim();
  if(!s||s==='-'||s==='—') return 0;
  s=s.replace(/r\$/ig,'').replace(/\s/g,'');
  if(s.indexOf(',')>-1){ s=s.replace(/\./g,'').replace(',','.'); }
  const f=parseFloat(s.replace(/[^0-9.\-]/g,''));
  return isNaN(f)?0:f;
}
