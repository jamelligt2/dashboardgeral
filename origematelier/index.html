<style>
:root{
--bg:#0a0a0a;--card:#151515;--card-2:#1c1c1c;--header:#111;--border:#2a2a2a;--border-strong:#3a3a3a;
--orange:#ff6b35;--orange-dark:#c44a1a;--orange-deep:#8b2a0a;--orange-bright:#ff8c42;--orange-pale:#ffb38a;--amber:#ff9500;
--text:#fff;--muted:#999;--muted-2:#b8b8b8;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',Roboto,system-ui,sans-serif;font-size:14px}
.header{background:var(--header);border-bottom:2px solid var(--orange);display:flex;align-items:center;gap:16px;padding:14px 24px;flex-wrap:wrap}
.logo-badge{background:linear-gradient(135deg,#ff6b35,#c44a1a);border-radius:10px;width:52px;height:52px;display:flex;align-items:center;justify-content:center;font-weight:800;letter-spacing:.5px;color:#fff;font-size:16px;flex-shrink:0}
.header-divider{width:1px;height:44px;background:var(--border-strong)}
.header-text h1{font-size:23px;font-weight:800;letter-spacing:.6px;line-height:1.1}
.header-text .subtitle{margin-top:6px;color:var(--muted-2);font-size:13px;display:flex;align-items:center;gap:7px;flex-wrap:wrap;font-weight:500}
.header-text .subtitle .dot{width:7px;height:7px;border-radius:50%;background:var(--orange);display:inline-block}
.header-text .subtitle .sep{color:var(--muted)}
.header-text .subtitle .accent{color:var(--orange);font-weight:700}
.tag{background:var(--orange);color:#0a0a0a;font-weight:700;font-size:11px;padding:3px 9px;border-radius:5px;letter-spacing:.4px}
.tag.alt{background:var(--orange-dark);color:#fff}
.switcher{display:flex;gap:8px;padding:16px 24px 0}
.switch-btn{background:var(--card);border:1px solid var(--border);color:var(--muted-2);padding:10px 22px;border-radius:9px;cursor:pointer;font-weight:700;font-size:13.5px;transition:.15s;display:flex;flex-direction:column;gap:2px;min-width:170px}
.switch-btn small{font-weight:500;font-size:11px;color:var(--muted)}
.switch-btn.active{border-color:var(--orange);background:linear-gradient(135deg,rgba(255,107,53,.16),rgba(196,74,26,.08));color:#fff}
.switch-btn.active small{color:var(--orange-pale)}
.periodbar{margin-left:auto;display:flex;flex-direction:column;align-items:flex-end;gap:8px}
.pb-controls{display:flex;align-items:center;gap:9px;flex-wrap:wrap;justify-content:flex-end}
.pb-range{display:flex;align-items:center;gap:7px;background:var(--card);border:1px solid var(--border);border-radius:9px;padding:5px 11px}
.pb-lbl{color:var(--muted);font-size:11.5px;font-weight:600;text-transform:uppercase;letter-spacing:.4px}
.pb-range input[type=date]{background:var(--card-2);border:1px solid var(--border);color:#fff;border-radius:6px;padding:4px 8px;font-size:12px;font-family:inherit;color-scheme:dark}
.pb-range input[type=date]:focus{outline:none;border-color:var(--orange)}
.pb-dash{color:var(--muted)}
.pb-quick{display:flex;gap:3px;background:var(--card);border:1px solid var(--border);border-radius:9px;padding:3px}
.pq{background:transparent;border:none;color:var(--muted-2);padding:5px 12px;border-radius:6px;cursor:pointer;font-size:12px;font-weight:700;transition:.12s}
.pq:hover{color:#fff}
.pq.active{background:var(--orange);color:#0a0a0a}
.pb-days{color:var(--muted);font-size:12px;font-weight:600;white-space:nowrap}
.pb-refresh{display:flex;align-items:center;gap:6px;background:var(--card);border:1px solid var(--border);color:var(--muted-2);padding:6px 13px;border-radius:8px;cursor:pointer;font-size:12.5px;font-weight:700;transition:.12s}
.pb-refresh:hover{border-color:var(--orange);color:#fff}
.pb-refresh svg{width:14px;height:14px}
.pb-refresh.spin svg{animation:spin .65s linear}
@keyframes spin{to{transform:rotate(360deg)}}
.pb-status{color:var(--muted-2);font-size:12.5px;font-weight:600;display:flex;align-items:center;gap:6px;white-space:nowrap}
.pb-status .ok{color:#2ecc71;font-weight:800}
.crlink{color:var(--orange);text-decoration:none;font-weight:600}
.crlink:hover{text-decoration:underline}
.nolink{color:var(--muted)}
.tabs{display:flex;gap:2px;background:var(--header);padding:0 24px;margin-top:16px;border-bottom:1px solid var(--border)}
.tab{background:transparent;border:none;color:var(--muted);padding:14px 20px;cursor:pointer;font-size:13.5px;font-weight:600;border-bottom:3px solid transparent}
.tab.active{color:var(--orange);border-bottom-color:var(--orange)}
.tab:hover{color:var(--muted-2)}
.wrap{padding:22px 24px 60px;max-width:1500px;margin:0 auto}
.panel{display:none}.panel.active{display:block}
.info-banner{background:linear-gradient(135deg,rgba(255,107,53,.10),rgba(196,74,26,.04));border:1px solid rgba(255,107,53,.3);border-radius:11px;padding:14px 18px;color:var(--muted-2);font-size:13px;line-height:1.55;margin-bottom:20px}
.info-banner b{color:var(--orange-pale)}
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px}
.kpi{background:var(--card);border:1px solid var(--border);border-top:3px solid var(--orange);border-radius:12px;padding:18px}
.kpi .lbl{color:var(--muted);font-size:12px;text-transform:uppercase;letter-spacing:.5px;font-weight:600}
.kpi .val{font-size:29px;font-weight:800;margin-top:8px;letter-spacing:.3px}
.kpi .sub{color:var(--muted);font-size:11.5px;margin-top:6px}
.kpi.c2{border-top-color:var(--orange-bright)}.kpi.c3{border-top-color:var(--amber)}.kpi.c4{border-top-color:var(--orange-dark)}
.sec-title{font-size:15px;font-weight:700;margin:26px 0 14px;color:#fff;display:flex;align-items:center;gap:9px}
.sec-title::before{content:'';width:4px;height:17px;background:var(--orange);border-radius:2px}
.adset-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(255px,1fr));gap:14px}
.adset-card{background:var(--card);border:1px solid var(--border);border-left:3px solid var(--orange);border-radius:11px;padding:16px}
.adset-card h4{font-size:13px;font-weight:700;line-height:1.35;margin-bottom:4px}
.adset-card .type{font-size:11px;font-weight:600;margin-bottom:12px}
.adset-card .big{font-size:23px;font-weight:800;color:var(--orange)}
.adset-card .row{display:flex;justify-content:space-between;font-size:12px;color:var(--muted-2);margin-top:7px}
.adset-card .row span:last-child{color:#fff;font-weight:600}
.adset-card .meta{border-top:1px solid var(--border);margin-top:12px;padding-top:10px;display:grid;grid-template-columns:1fr 1fr;gap:5px 12px;font-size:11.5px;color:var(--muted)}
.adset-card .meta b{color:var(--muted-2);font-weight:600}
.adset-card.inativo{opacity:.6}
.adset-card.inativo .big{color:var(--muted-2)}
.card-st{font-size:9.5px;vertical-align:middle;margin-left:2px}
.ina-tag{background:var(--card-2);color:var(--muted);border:1px solid var(--border-strong);font-size:9.5px;font-weight:700;padding:2px 6px;border-radius:4px;letter-spacing:.4px;vertical-align:middle;margin-left:4px}
.sec-count{font-weight:500;color:var(--muted);font-size:12px}
.adset-filter{display:flex;gap:8px;margin-bottom:14px}
.af-btn{background:var(--card);border:1px solid var(--border);color:var(--muted-2);padding:8px 18px;border-radius:8px;cursor:pointer;font-weight:600;font-size:13px;transition:.15s}
.af-btn b{color:var(--muted);font-weight:800;margin-left:3px}
.af-btn.active{border-color:var(--orange);background:linear-gradient(135deg,rgba(255,107,53,.16),rgba(196,74,26,.08));color:#fff}
.af-btn.active b{color:var(--orange)}
.adset-empty{color:var(--muted);font-size:13px;padding:6px 2px}
.funnel-wrap{display:flex;gap:18px;align-items:stretch;flex-wrap:wrap}
.funnel-svg{flex:1 1 58%;min-width:340px;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px}
.funnel-cards{flex:1 1 34%;min-width:230px;display:flex;flex-direction:column;gap:14px}
.fcard{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:18px;flex:1;position:relative;overflow:hidden;display:flex;flex-direction:column;justify-content:center}
.fcard .lbl{color:var(--muted);font-size:12px;text-transform:uppercase;letter-spacing:.5px;font-weight:600}
.fcard .val{font-size:27px;font-weight:800;margin-top:6px}
.fcard .sub{color:var(--muted);font-size:11px;margin-top:4px}
.fcard::after{content:'';position:absolute;left:0;bottom:0;height:3px;width:100%;background:var(--orange)}
.fcard.b2::after{background:var(--amber)}.fcard.b3::after{background:var(--orange-bright)}
.chart-grid{display:grid;grid-template-columns:2fr 1fr;gap:16px;margin-top:6px}
.chart-box{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px}
.chart-box h5{font-size:13px;color:var(--muted-2);margin-bottom:12px;font-weight:600}
.cholder{position:relative;height:280px;width:100%}
.cholder canvas{position:absolute!important;top:0;left:0;width:100%!important;height:100%!important}
.cholder.dough{height:300px}
.tbl-wrap{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:auto;max-height:560px;margin-top:16px}
table{width:100%;border-collapse:collapse;font-size:12.5px}
thead th{background:var(--bg);color:var(--muted-2);text-align:right;padding:11px 12px;position:sticky;top:0;font-weight:600;white-space:nowrap;border-bottom:1px solid var(--border)}
thead th.left{text-align:left}
tbody td{padding:9px 12px;text-align:right;border-bottom:1px solid var(--border);white-space:nowrap}
tbody td.left{text-align:left}
tbody tr:hover{background:rgba(255,107,53,.06)}
tr.total td{background:var(--bg);color:var(--orange);font-weight:700;border-top:2px solid var(--orange);position:sticky;bottom:0}
.rank{display:inline-flex;width:24px;height:24px;border-radius:50%;align-items:center;justify-content:center;font-weight:800;font-size:12px}
.r1{background:var(--orange-bright);color:#0a0a0a}.r2{background:var(--orange-dark);color:#fff}.r3{background:var(--orange-deep);color:#fff;border:1px solid var(--orange-dark)}
.rn{background:var(--card-2);color:var(--muted-2);border:1px solid var(--border)}
.badge{padding:3px 8px;border-radius:5px;font-size:10.5px;font-weight:700;letter-spacing:.3px}
.b-esc{background:var(--orange);color:#0a0a0a}.b-man{background:rgba(255,149,0,.18);color:var(--amber);border:1px solid var(--amber)}
.b-pau{background:rgba(139,42,10,.4);color:var(--orange-pale);border:1px solid var(--orange-deep)}.b-ava{background:var(--card-2);color:var(--muted);border:1px solid var(--border)}
.dough-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:16px}
.hot{color:var(--orange)}.warm{color:var(--amber)}.cool{color:var(--orange-pale)}
b.conv{color:var(--orange)}
@media(max-width:900px){.kpi-grid{grid-template-columns:repeat(2,1fr)}.chart-grid,.dough-grid{grid-template-columns:1fr}}
</style>
</head>

function tipoOf(n){

  if(s.includes('proximidad')||s.includes('efigênia')||s.includes('efigenia')||s.includes('+km')||s.includes('km'))return['Frio · Proximidade','cool'];
  if(s.includes('hobby')||s.includes('interess'))return['Frio · Interesses','warm'];
  if(s.includes('empres')||s.includes('corporativo')||s.includes('restaurante')||s.includes('fotógrafo')||s.includes('fotografo')||s.includes('hote')||s.includes('clínica')||s.includes('clinica'))return['Frio · Segmento B2B','hot'];
  return['Frio · Ampliação','warm'];
}

  return{spend:s,impr:i,reach:r,clk:c,conv:v,ctr:i?c/i*100:0,cpc:c?s/c:0,cpm:i?s/i*1000:0,cpl:v?s/v:0,clqconv:c?v/c*100:0};}

    </div>`;
  // daily table aggregated by date
  const byDate=[...groupBy(rows,x=>x.date).entries()].map(([k,rs])=>({date:k,...agg(rs)})).sort((a,b)=>a.date<b.date?-1:1);
  h+=`<div class="tbl-wrap"><table><thead><tr>
    <th class="left">Dia</th><th>Invest.</th><th>Impr.</th><th>Cliques</th><th>Conversas</th><th>CTR</th><th>CPC</th><th>CPM</th><th>Custo/Conv</th><th>Clq→Conv</th></tr></thead><tbody>`;
  byDate.forEach(d=>{h+=`<tr><td class="left">${brDate(d.date)}</td><td>${BRL(d.spend)}</td><td>${INT(d.impr)}</td><td>${INT(d.clk)}</td><td>${d.conv?'<b class="conv">'+INT(d.conv)+'</b>':'0'}</td><td>${PCT(d.ctr)}</td><td>${BRL(d.cpc)}</td><td>${BRL(d.cpm)}</td><td>${d.conv?BRL(d.cpl):'—'}</td><td>${PCT(d.clqconv)}</td></tr>`;});
  h+=`<tr class="total"><td class="left">TOTAL</td><td>${BRL(t.spend)}</td><td>${INT(t.impr)}</td><td>${INT(t.clk)}</td><td>${INT(t.conv)}</td><td>${PCT(t.ctr)}</td><td>${BRL(t.cpc)}</td><td>${BRL(t.cpm)}</td><td>${BRL(t.cpl)}</td><td>${PCT(t.clqconv)}</td></tr>`;
  h+=`</tbody></table></div>`;
  document.getElementById('panel-geral').innerHTML=h;
  geralCD={byDate,labels:byDate.map(d=>brDate(d.date))};
}
function funnelSVG(t){
  const ctr=PCT(t.ctr),cc=PCT(t.clqconv);
  return `<svg viewBox="0 0 1200 520" width="100%" xmlns="http://www.w3.org/2000/svg">
  <defs><filter id="glow" x="-30%" y="-30%" width="160%" height="160%"><feGaussianBlur stdDeviation="7" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  <linearGradient id="g1" x1="0" x2="1"><stop offset="0" stop-color="#2a1105"/><stop offset="0.5" stop-color="#8b2a0a"/><stop offset="1" stop-color="#2a1105"/></linearGradient>
  <linearGradient id="g2" x1="0" x2="1"><stop offset="0" stop-color="#5c2005"/><stop offset="0.5" stop-color="#c44a1a"/><stop offset="1" stop-color="#5c2005"/></linearGradient>
  <linearGradient id="g3" x1="0" x2="1"><stop offset="0" stop-color="#8b2a0a"/><stop offset="0.5" stop-color="#ff6b35"/><stop offset="1" stop-color="#8b2a0a"/></linearGradient></defs>
  <polygon points="120,20 1080,20 960,150 240,150" fill="url(#g1)" stroke="#c44a1a" stroke-width="2"/>
  <text x="600" y="80" text-anchor="middle" fill="#fff" font-size="22" font-weight="600" opacity="0.85">IMPRESSÕES</text>
  <text x="600" y="128" text-anchor="middle" fill="#fff" font-size="56" font-weight="800">${INT(t.impr)}</text>
  <text x="600" y="185" text-anchor="middle" fill="#ff9500" font-size="24" font-weight="700">CTR ${ctr}</text>
  <polygon points="270,210 930,210 810,340 390,340" fill="url(#g2)" stroke="#ff8c42" stroke-width="2"/>
  <text x="600" y="265" text-anchor="middle" fill="#fff" font-size="20" font-weight="600" opacity="0.85">CLIQUES NO LINK</text>
  <text x="600" y="320" text-anchor="middle" fill="#fff" font-size="56" font-weight="800">${INT(t.clk)}</text>
  <text x="600" y="378" text-anchor="middle" fill="#ff6b35" font-size="24" font-weight="700">TX CLIQUE → CONVERSA ${cc}</text>
  <polygon points="420,405 780,405 700,510 500,510" fill="url(#g3)" filter="url(#glow)"/>
  <text x="600" y="450" text-anchor="middle" fill="#fff" font-size="17" font-weight="600" opacity="0.9">CONVERSAS INICIADAS</text>
  <text x="600" y="492" text-anchor="middle" fill="#fff" font-size="32" font-weight="800">${INT(t.conv)}</text>
  </svg>`;
}
function drawCombo(data,labels){const ctx=document.getElementById('ch-combo');
  charts.push(new Chart(ctx,{data:{labels,datasets:[
    {type:'bar',label:'Conversas',data:data.map(d=>d.conv),backgroundColor:'#ff6b35',yAxisID:'y',order:2},
    {type:'line',label:'Investimento',data:data.map(d=>d.spend),borderColor:'#ff9500',backgroundColor:'rgba(255,149,0,.1)',yAxisID:'y1',tension:.3,pointRadius:0,borderWidth:2,order:1}
  ]},options:copt({y:{title:{display:true,text:'Conversas',color:'#999'}},y1:{position:'right',grid:{drawOnChartArea:false},title:{display:true,text:'R$',color:'#999'}}})}));}
function drawCpl(data,labels){const ctx=document.getElementById('ch-cpl');
  charts.push(new Chart(ctx,{type:'line',data:{labels,datasets:[{label:'Custo/Conversa',data:data.map(d=>d.conv?d.cpl:null),borderColor:'#ff6b35',backgroundColor:'rgba(255,107,53,.12)',tension:.3,pointRadius:0,borderWidth:2,spanGaps:true,fill:true}]},options:copt({y:{title:{display:true,text:'R$',color:'#999'}}})}));}
function copt(scales){const base={x:{ticks:{color:'#777',maxTicksLimit:12,font:{size:10}},grid:{color:'#1c1c1c'}}};
  for(const k in scales){scales[k]={...scales[k],ticks:{color:'#777',font:{size:10}},grid:{color:'#1c1c1c'}};if(scales[k].position==='right')scales[k].grid={drawOnChartArea:false};}
  return{responsive:true,maintainAspectRatio:false,interaction:{mode:'index',intersect:false},plugins:{legend:{labels:{color:'#b8b8b8',font:{size:11},boxWidth:12}}},scales:{...base,...scales}};}

function statusOf(sp,conv,cpl){
  if(conv>=3&&cpl<=5)return['ESCALAR','b-esc'];
  if(conv>=1&&cpl<=15)return['MANTER','b-man'];
  if(sp>=5&&conv===0)return['PAUSAR','b-pau'];
  return['AVALIAR','b-ava'];
}
function renderCriativos(rows){
  let cr=[...groupBy(rows,x=>x.ad).entries()].map(([k,rs])=>({name:k,link:curLink(rs),status:curStatus(rs),...agg(rs)}));
  cr.sort((a,b)=>{const ac=a.conv>0,bc=b.conv>0;if(ac&&bc)return a.cpl-b.cpl;if(ac)return -1;if(bc)return 1;return b.spend-a.spend;});
  let h=`<div class="tbl-wrap"><table><thead><tr><th class="left">#</th><th class="left">Criativo</th><th>Invest.</th><th>Impr.</th><th>Cliques</th><th>Conversas</th><th>CTR</th><th>CPC</th><th>CPM</th><th>Custo/Conv</th><th>Clq→Conv</th><th class="left">Link</th><th>Status</th></tr></thead><tbody>`;
  cr.forEach((c,i)=>{const rk=i===0?'r1':i===1?'r2':i===2?'r3':'rn';const[st,sc]=statusLabel(c.status);
    h+=`<tr><td class="left"><span class="rank ${rk}">${i+1}</span></td><td class="left">${c.name}</td><td>${BRL(c.spend)}</td><td>${INT(c.impr)}</td><td>${INT(c.clk)}</td><td>${c.conv?'<b class="conv">'+INT(c.conv)+'</b>':'0'}</td><td>${PCT(c.ctr)}</td><td>${BRL(c.cpc)}</td><td>${BRL(c.cpm)}</td><td>${c.conv?BRL(c.cpl):'—'}</td><td>${PCT(c.clqconv)}</td><td class="left">${c.link?`<a class="crlink" href="${c.link}" target="_blank" rel="noopener">Ver anúncio</a>`:`<span class="nolink">—</span>`}</td><td><span class="badge ${sc}">${st}</span></td></tr>`;});
  h+=`</tbody></table></div>`;
  document.getElementById('panel-criativos').innerHTML=h;
}
function renderPublicos(rows){
  let ad=[...groupBy(rows,x=>x.adset).entries()].map(([k,rs])=>({name:k,status:curStatus(rs),...agg(rs)})).sort((a,b)=>b.spend-a.spend);
  let h=`<div class="tbl-wrap"><table><thead><tr><th class="left">#</th><th class="left">Conjunto</th><th class="left">Tipo</th><th>Invest.</th><th>Impr.</th><th>Cliques</th><th>Conversas</th><th>CTR</th><th>CPC</th><th>CPM</th><th>Custo/Conv</th><th>Clq→Conv</th><th>Status</th></tr></thead><tbody>`;
  ad.forEach((a,i)=>{const[tp,cl]=tipoOf(a.name);const[st,sc]=statusLabel(a.status);
    h+=`<tr><td class="left">${i+1}</td><td class="left">${a.name}</td><td class="left ${cl}">${tp}</td><td>${BRL(a.spend)}</td><td>${INT(a.impr)}</td><td>${INT(a.clk)}</td><td>${a.conv?'<b class="conv">'+INT(a.conv)+'</b>':'0'}</td><td>${PCT(a.ctr)}</td><td>${BRL(a.cpc)}</td><td>${BRL(a.cpm)}</td><td>${a.conv?BRL(a.cpl):'—'}</td><td>${PCT(a.clqconv)}</td><td><span class="badge ${sc}">${st}</span></td></tr>`;});
  h+=`</tbody></table></div>
  <div class="dough-grid"><div class="chart-box"><h5>Investimento por conjunto</h5><div class="cholder dough"><canvas id="ch-dsp"></canvas></div></div><div class="chart-box"><h5>Conversas por conjunto</h5><div class="cholder dough"><canvas id="ch-dcv"></canvas></div></div></div>`;
  document.getElementById('panel-publicos').innerHTML=h;
  publicosCD={ad};
}
function dopt(){return{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{color:'#b8b8b8',font:{size:10},boxWidth:11,padding:8}}}};}
function renderDiaria(rows){
  let g=[...groupBy(rows,x=>x.date+'|'+x.adset+'|'+x.ad).entries()].map(([k,rs])=>{const[date,adset,ad]=k.split('|');return{date,adset,ad,...agg(rs)};});
  g.sort((a,b)=>a.date<b.date?-1:a.date>b.date?1:(a.adset<b.adset?-1:a.adset>b.adset?1:(a.ad<b.ad?-1:1)));
  let h=`<div class="info-banner" style="margin-bottom:14px">Detalhamento granular: uma linha por <b>dia × conjunto × criativo</b> (${INT(g.length)} linhas). Conversas destacadas em laranja.</div>
  <div class="tbl-wrap"><table><thead><tr><th class="left">Dia</th><th class="left">Conjunto</th><th class="left">Criativo</th><th>Invest.</th><th>Impr.</th><th>Cliques</th><th>Conversas</th><th>CTR</th><th>CPC</th><th>CPM</th><th>Custo/Conv</th></tr></thead><tbody>`;
  g.forEach(d=>{const[,cl]=tipoOf(d.adset);
    h+=`<tr><td class="left">${brDate(d.date)}</td><td class="left ${cl}">${d.adset}</td><td class="left">${d.ad}</td><td>${BRL(d.spend)}</td><td>${INT(d.impr)}</td><td>${INT(d.clk)}</td><td>${d.conv?'<b class="conv">'+INT(d.conv)+'</b>':'0'}</td><td>${PCT(d.ctr)}</td><td>${BRL(d.cpc)}</td><td>${BRL(d.cpm)}</td><td>${d.conv?BRL(d.cpl):'—'}</td></tr>`;});
  h+=`</tbody></table></div>`;
  document.getElementById('panel-diaria').innerHTML=h;
}
function setCampaign(c){cur=c;document.querySelectorAll('.switch-btn').forEach(b=>b.classList.toggle('active',b.dataset.c===c));destroyCharts();initPeriod();renderAll();applyTabVisibility();}
function setTab(t){curTab=t;document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('active',b.dataset.t===t));applyTabVisibility();}
function filterAdsets(g){document.querySelectorAll('.af-btn').forEach(b=>b.classList.toggle('active',b.dataset.g===g));
  const ga=document.getElementById('grid-ativos'),gi=document.getElementById('grid-inativos');
  if(ga)ga.style.display=g==='ativos'?'grid':'none';if(gi)gi.style.display=g==='inativos'?'grid':'none';}
function applyTabVisibility(){document.querySelectorAll('.panel').forEach(p=>p.classList.toggle('active',p.id==='panel-'+curTab));drawCharts();}
function drawCharts(){destroyCharts();try{
  if(curTab==='geral'&&geralCD){drawCombo(geralCD.byDate,geralCD.labels);drawCpl(geralCD.byDate,geralCD.labels);}
  if(curTab==='publicos'&&publicosCD){const ad=publicosCD.ad;const oc=['#ff6b35','#c44a1a','#ff8c42','#8b2a0a','#ff9500','#ffb38a','#a53612','#e05a20'];const lbls=ad.map(a=>a.name);
    charts.push(new Chart(document.getElementById('ch-dsp'),{type:'doughnut',data:{labels:lbls,datasets:[{data:ad.map(a=>a.spend),backgroundColor:oc,borderColor:'#0a0a0a',borderWidth:2}]},options:dopt()}));
    charts.push(new Chart(document.getElementById('ch-dcv'),{type:'doughnut',data:{labels:lbls,datasets:[{data:ad.map(a=>a.conv),backgroundColor:oc,borderColor:'#0a0a0a',borderWidth:2}]},options:dopt()}));}
}catch(e){console.error('chart error',e);}}
// init labels

initPeriod();renderAll();applyTabVisibility();
</script>
</body>
</html>
