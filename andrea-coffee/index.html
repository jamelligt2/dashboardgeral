<script>
// ╔══════════════════════════════════════════════════════════════════╗
// ║           CONFIGURAÇÃO DO CLIENTE — EDITE APENAS AQUI           ║
// ╚══════════════════════════════════════════════════════════════════╝
const CONFIG = {
  CLIENTE: 'Andrea',
  PRODUTO: 'Curso de Coffee Break Lucrativo',
  ANO: '2026',
  SHEET_ID: '1hnVA2zgZPftFX7juyvGbH4367LcbKnM5OW2lekmCFms',
  GERENCIADOR_GID: '0',
  WEBHOOK_GID: '2002460032',
  DATA_MINIMA: '2026-06-01',
  PRODUTO_NOME: 'coffee break',
  PRODUTO_PRECO_MINIMO: 0,
  // Planilha Hotmart SEM colunas UTM. Decisão do gestor: todas as vendas
  // aprovadas são tratadas como resultado do tráfego pago (Meta Ads).
  TUDO_TRAFEGO: true,
  VALORES_EM_CENTAVOS: false,
  // ── Colunas do Webhook (Hotmart) 0-based ──
  W: { data:16, produto:0, status:18, cliente:19, email:21, fatTotal:41 },
  // ── Colunas do Gerenciador (Stract/Meta) 0-based ──
  G: { date:0, inv:1, cliques:2, pv:3, ck:4, purchase:5, adset:6, ad:7, link:8, campaign:9, reach:10, imp:11 },
  STATUS_APROVADO: ['APPROVED','COMPLETE','CONFIRMED','PAGO','APROVADO'],
};
const G = CONFIG.G, W = CONFIG.W;

document.title = CONFIG.PRODUTO + ' · ' + CONFIG.CLIENTE + ' — Jamelli GT';
document.getElementById('brand-title').textContent = '📦 ' + CONFIG.PRODUTO + ' · ' + CONFIG.CLIENTE;
document.getElementById('brand-subtitle').textContent = 'Dashboard de Performance — Perpétuo · Jamelli GT · ' + CONFIG.ANO;

// ── Estado global ──
let GROWS = [], SALES = [], DIAS = [];
let CHARTS = {};

// ── Helpers de formatação BR ──
const fmtR$ = v => (v||v===0) ? 'R$ ' + (v).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2}) : '—';
const fmtNum = v => (v||v===0) ? (v).toLocaleString('pt-BR') : '—';
const fmtPct = v => (v||v===0) ? (v).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2})+'%' : '—';
const dash = (v,f) => (v && isFinite(v)) ? f(v) : '—';

// parse número BR ("1.234,56" ou "174,01" ou "197" ou "0.2")
function pNum(s){
  if(s===null||s===undefined) return 0;
  if(typeof s==='number') return s;
  s=String(s).trim().replace(/["R$\s]/g,'');
  if(!s) return 0;
  if(s.indexOf(',')>=0){ s=s.replace(/\./g,'').replace(',', '.'); }
  const n=parseFloat(s); return isNaN(n)?0:n;
}
// data Gerenciador YYYY-MM-DD (ou Date(...))
function pDateGer(s){
  if(!s) return '';
  s=String(s).trim();
  let m=s.match(/^(\d{4})-(\d{2})-(\d{2})/);
  if(m) return m[1]+'-'+m[2]+'-'+m[3];
  m=s.match(/Date\((\d+),(\d+),(\d+)/);
  if(m){ const y=m[1],mo=String(+m[2]+1).padStart(2,'0'),d=String(+m[3]).padStart(2,'0'); return y+'-'+mo+'-'+d; }
  m=s.match(/^(\d{2})\/(\d{2})\/(\d{4})/);
  if(m) return m[3]+'-'+m[2]+'-'+m[1];
  return '';
}
// data Webhook DD/MM/YYYY HH:MM:SS
function pDateWh(s){
  if(!s) return '';
  s=String(s).trim();
  let m=s.match(/^(\d{2})\/(\d{2})\/(\d{4})/);
  if(m) return m[3]+'-'+m[2]+'-'+m[1];
  m=s.match(/^(\d{4})-(\d{2})-(\d{2})/);
  if(m) return m[1]+'-'+m[2]+'-'+m[3];
  return '';
}

// ── CSV parser ──
function parseCSV(text){
  const rows=[]; let row=[], cur='', q=false;
  for(let i=0;i<text.length;i++){
    const c=text[i];
    if(q){
      if(c==='"'){ if(text[i+1]==='"'){cur+='"';i++;} else q=false; }
      else cur+=c;
    } else {
      if(c==='"') q=true;
      else if(c===','){ row.push(cur); cur=''; }
      else if(c==='\n'){ row.push(cur); rows.push(row); row=[]; cur=''; }
      else if(c==='\r'){}
      else cur+=c;
    }
  }
  if(cur!==''||row.length){ row.push(cur); rows.push(row); }
  return rows;
}

async function fetchSheetCSV(gid){
  const url = `https://docs.google.com/spreadsheets/d/${CONFIG.SHEET_ID}/gviz/tq?tqx=out:csv&gid=${gid}`;
  const controller = new AbortController();
  const timeout = setTimeout(()=>controller.abort(), 20000);
  try {
    const resp = await fetch(url, { signal: controller.signal });
    clearTimeout(timeout);
    if(!resp.ok) throw new Error(`Aba gid ${gid}: HTTP ${resp.status}. Verifique se a planilha está pública.`);
    const text = await resp.text();
    if(text.includes('Signin')||text.includes('accounts.google'))
      throw new Error(`Aba gid ${gid} requer login. Defina como pública.`);
    return text;
  } catch(e){
    clearTimeout(timeout);
    if(e.name==='AbortError') throw new Error(`Timeout ao carregar aba gid ${gid}.`);
    throw e;
  }
}

const isAprov = s => CONFIG.STATUS_APROVADO.includes(String(s||'').trim().toUpperCase());

// ════════════════ CARREGAR DADOS ════════════════
async function loadData(){
  const ov=document.getElementById('loading-overlay');
  ov.style.display='flex';
  document.getElementById('loading-msg').textContent='Conectando com a planilha...';
  try {
    const [gerTxt, whTxt] = await Promise.all([
      fetchSheetCSV(CONFIG.GERENCIADOR_GID),
      fetchSheetCSV(CONFIG.WEBHOOK_GID),
    ]);
    document.getElementById('loading-msg').textContent='Processando dados...';

    // ── Gerenciador ──
    const gRaw = parseCSV(gerTxt).slice(1).filter(r=>r.length>3 && r[G.date]);
    GROWS = gRaw.map(r=>({
      data: pDateGer(r[G.date]),
      inv: pNum(r[G.inv]),
      cliques: pNum(r[G.cliques]),
      pv: pNum(r[G.pv]),
      ck: pNum(r[G.ck]),
      purchase: pNum(r[G.purchase]),
      adset: (r[G.adset]||'—').trim(),
      ad: (r[G.ad]||'—').trim(),
      link: (r[G.link]||'').trim(),
      campaign: (r[G.campaign]||'').trim(),
      reach: pNum(r[G.reach]),
      imp: pNum(r[G.imp]),
    })).filter(r=>r.data && r.data>=CONFIG.DATA_MINIMA);

    // ── Webhook (vendas) ──
    const wRaw = parseCSV(whTxt).slice(1).filter(r=>r.length>W.fatTotal);
    SALES = wRaw.map(r=>({
      data: pDateWh(r[W.data]),
      produto: (r[W.produto]||'').trim(),
      status: (r[W.status]||'').trim(),
      nome: (r[W.cliente]||'').trim(),
      email: (r[W.email]||'').trim(),
      fatTotal: CONFIG.VALORES_EM_CENTAVOS ? pNum(r[W.fatTotal])/100 : pNum(r[W.fatTotal]),
    })).filter(s =>
      s.data && s.data>=CONFIG.DATA_MINIMA &&
      isAprov(s.status) &&
      s.produto.toLowerCase().includes(CONFIG.PRODUTO_NOME) &&
      s.fatTotal>=CONFIG.PRODUTO_PRECO_MINIMO
    ).map(s=>({...s, fatOB:0, fatPrincipal:s.fatTotal, isTrafego: CONFIG.TUDO_TRAFEGO}));
    SALES.sort((a,b)=>b.data.localeCompare(a.data));

    // dias do gerenciador (agregado)
    const dmap={};
    GROWS.forEach(r=>{
      if(!dmap[r.data]) dmap[r.data]={data:r.data,inv:0,cliques:0,pv:0,ck:0,imp:0};
      const d=dmap[r.data]; d.inv+=r.inv; d.cliques+=r.cliques; d.pv+=r.pv; d.ck+=r.ck; d.imp+=r.imp;
    });
    DIAS = Object.values(dmap).sort((a,b)=>a.data.localeCompare(b.data));

    // datas para presets
    const allDates=[...DIAS.map(d=>d.data),...SALES.map(s=>s.data)].filter(Boolean).sort();
    if(allDates.length){
      const from=document.getElementById('dateFrom'), to=document.getElementById('dateTo');
      if(!from.value) from.value=allDates[0];
      if(!to.value) to.value=allDates[allDates.length-1];
    }
    ov.style.display='none';
    renderAll();
  } catch(e){
    document.getElementById('loading-msg').innerHTML='⚠️ '+e.message+'<br><br><span style="font-size:11px;opacity:.6">Clique em Atualizar para tentar novamente.</span>';
  }
}

// ── Filtro de data ──
function getRange(){
  const f=document.getElementById('dateFrom').value;
  const t=document.getElementById('dateTo').value;
  return {from:f||null, to:t||null};
}
function inRange(d,from,to){ return (!from||d>=from)&&(!to||d<=to); }

function setPreset(days, btn){
  document.querySelectorAll('.preset-btn').forEach(b=>b.classList.remove('active'));
  if(btn) btn.classList.add('active');
  const allDates=[...DIAS.map(d=>d.data),...SALES.map(s=>s.data)].filter(Boolean).sort();
  if(!allDates.length) return;
  const last=allDates[allDates.length-1];
  if(days==='all'){
    document.getElementById('dateFrom').value=allDates[0];
    document.getElementById('dateTo').value=last;
  } else {
    const d=new Date(last+'T00:00:00'); d.setDate(d.getDate()-(days-1));
    document.getElementById('dateFrom').value=d.toISOString().slice(0,10);
    document.getElementById('dateTo').value=last;
  }
  renderAll();
}
function onDateChange(){
  document.querySelectorAll('.preset-btn').forEach(b=>b.classList.remove('active'));
  renderAll();
}

// ════════════════ AGREGAÇÃO POR PERÍODO ════════════════
function aggregate(from,to){
  const g=GROWS.filter(r=>inRange(r.data,from,to));
  const s=SALES.filter(v=>inRange(v.data,from,to));
  const inv=g.reduce((a,r)=>a+r.inv,0);
  const cliques=g.reduce((a,r)=>a+r.cliques,0);
  const pv=g.reduce((a,r)=>a+r.pv,0);
  const ck=g.reduce((a,r)=>a+r.ck,0);
  const imp=g.reduce((a,r)=>a+r.imp,0);
  const fatTraf=s.filter(v=>v.isTrafego).reduce((a,v)=>a+v.fatTotal,0);
  const fatOrg=s.filter(v=>!v.isTrafego).reduce((a,v)=>a+v.fatTotal,0);
  const fatOBtraf=s.filter(v=>v.isTrafego).reduce((a,v)=>a+v.fatOB,0);
  const fatOBorg=s.filter(v=>!v.isTrafego).reduce((a,v)=>a+v.fatOB,0);
  const vTraf=s.filter(v=>v.isTrafego).length;
  const vOrg=s.filter(v=>!v.isTrafego).length;
  const obTraf=s.filter(v=>v.isTrafego&&v.fatOB>0).length;
  const obOrg=s.filter(v=>!v.isTrafego&&v.fatOB>0).length;
  const fatTotal=fatTraf+fatOrg;
  const vendasTotal=vTraf+vOrg;
  return {g,s,inv,cliques,pv,ck,imp,fatTraf,fatOrg,fatOBtraf,fatOBorg,vTraf,vOrg,obTraf,obOrg,fatTotal,vendasTotal,
    roasTraf: inv>0?fatTraf/inv:0,
    roasTotal: inv>0?fatTotal/inv:0,
    cac: vTraf>0?inv/vTraf:0,
    cacTotal: vendasTotal>0?inv/vendasTotal:0,
    ticket: vendasTotal>0?fatTotal/vendasTotal:0,
    cpc: cliques>0?inv/cliques:0,
    cpm: imp>0?inv/imp*1000:0,
    ctr: imp>0?cliques/imp*100:0,
  };
}

// ════════════════ RENDER GERAL ════════════════
function renderAll(){
  const {from,to}=getRange();
  document.getElementById('range-info').textContent =
    (from&&to)? from.split('-').reverse().join('/')+' → '+to.split('-').reverse().join('/') : '';
  const A=aggregate(from,to);
  renderTrafego(A,from,to);
  renderVisao(A,from,to);
  const maps=buildCriPubMaps(from,to);
  renderCriativos(maps,from,to);
  renderPublicos(maps,from,to);
  renderSemanal();
  renderMensal();
}

// ── Determinar ativo: gastou na data mais recente do dataset ──
function lastSpendDate(){
  const ds=GROWS.filter(r=>r.inv>0).map(r=>r.data).sort();
  return ds.length?ds[ds.length-1]:null;
}

// ════════════════ MAPAS CRIATIVOS / PÚBLICOS ════════════════
function buildCriPubMaps(from,to){
  const lastDate=lastSpendDate();
  const cri={}, pub={};
  GROWS.filter(r=>inRange(r.data,from,to)).forEach(r=>{
    if(!cri[r.ad]) cri[r.ad]={nome:r.ad,inv:0,cliques:0,pv:0,ck:0,imp:0,link:r.link,active:false};
    const c=cri[r.ad]; c.inv+=r.inv; c.cliques+=r.cliques; c.pv+=r.pv; c.ck+=r.ck; c.imp+=r.imp;
    if(r.link&&!c.link) c.link=r.link;
    if(lastDate && r.data===lastDate && r.inv>0) c.active=true;

    if(!pub[r.adset]) pub[r.adset]={nome:r.adset,inv:0,cliques:0,pv:0,ck:0,imp:0,active:false};
    const p=pub[r.adset]; p.inv+=r.inv; p.cliques+=r.cliques; p.pv+=r.pv; p.ck+=r.ck; p.imp+=r.imp;
    if(lastDate && r.data===lastDate && r.inv>0) p.active=true;
  });
  const decorate=o=>{ o.ctr=o.imp>0?o.cliques/o.imp*100:0; o.cpc=o.cliques>0?o.inv/o.cliques:0; o.cpm=o.imp>0?o.inv/o.imp*1000:0; return o; };
  return {
    criativos: Object.values(cri).map(decorate).filter(c=>c.inv>0||c.imp>0),
    publicos: Object.values(pub).map(decorate).filter(p=>p.inv>0||p.imp>0),
  };
}

// ════════════════ SEMANA A SEMANA ════════════════
function weekKey(d){
  const dt=new Date(d+'T00:00:00');
  const day=(dt.getDay()+6)%7; // segunda=0
  dt.setDate(dt.getDate()-day);
  return dt.toISOString().slice(0,10);
}
function buildPeriodos(keyFn,label){
  const m={};
  GROWS.forEach(r=>{const k=keyFn(r.data);if(!m[k])m[k]={k,inv:0,cliques:0,imp:0,fat:0,vendas:0};m[k].inv+=r.inv;m[k].cliques+=r.cliques;m[k].imp+=r.imp;});
  SALES.forEach(v=>{const k=keyFn(v.data);if(!m[k])m[k]={k,inv:0,cliques:0,imp:0,fat:0,vendas:0};m[k].fat+=v.fatTotal;m[k].vendas++;});
  return Object.values(m).map(o=>({...o,ctr:o.imp>0?o.cliques/o.imp*100:0,roas:o.inv>0?o.fat/o.inv:0,label:label(o.k)})).sort((a,b)=>a.k.localeCompare(b.k));
}
function renderPeriodTab(elId,chartId1,chartId2,data,colLabel){
  const el=document.getElementById(elId);
  el.innerHTML=`
  <div class="chart-grid-2x2">
    <div class="chart-card"><h4>Investimento por ${colLabel}</h4><canvas id="${chartId1}"></canvas></div>
    <div class="chart-card"><h4>CTR por ${colLabel}</h4><canvas id="${chartId2}"></canvas></div>
  </div>
  <div class="tbl-wrap"><table>
    <thead><tr><th>${colLabel}</th><th>Invest.</th><th>Cliques</th><th>Impr.</th><th>CTR</th><th>Fat.</th><th>Vendas</th><th>ROAS</th></tr></thead>
    <tbody>${data.slice().reverse().map(d=>`<tr><td>${d.label}</td><td>${fmtR$(d.inv)}</td><td>${fmtNum(d.cliques)}</td><td>${fmtNum(d.imp)}</td><td>${dash(d.ctr,fmtPct)}</td><td>${fmtR$(d.fat)}</td><td>${d.vendas||'—'}</td><td class="${d.roas>=1?'green':'red'}">${dash(d.roas,v=>v.toFixed(2)+'x')}</td></tr>`).join('')}</tbody>
  </table></div>`;
  drawBar(chartId1,data.map(d=>d.label),data.map(d=>d.inv),'Investimento (R$)','rgba(255,107,43,0.85)');
  drawBar(chartId2,data.map(d=>d.label),data.map(d=>+d.ctr.toFixed(2)),'CTR (%)','rgba(255,183,55,0.85)');
}
function renderSemanal(){
  const data=buildPeriodos(weekKey,k=>{const dt=new Date(k+'T00:00:00');const e=new Date(dt);e.setDate(e.getDate()+6);return dt.getDate()+'/'+(dt.getMonth()+1)+'–'+e.getDate()+'/'+(e.getMonth()+1);});
  renderPeriodTab('tab-semanal','chSemInv','chSemCtr',data,'Semana');
}
function renderMensal(){
  const meses=['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];
  const data=buildPeriodos(d=>d.slice(0,7),k=>{const[y,m]=k.split('-');return meses[+m-1]+'/'+y;});
  renderPeriodTab('tab-mensal','chMesInv','chMesCtr',data,'Mês');
}
function drawBar(id,labels,vals,lbl,color){
  const cv=document.getElementById(id); if(!cv) return;
  if(CHARTS[id]) CHARTS[id].destroy();
  CHARTS[id]=new Chart(cv,{type:'bar',data:{labels,datasets:[{label:lbl,data:vals,backgroundColor:color,borderRadius:4}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},
      scales:{x:{ticks:{color:'rgba(255,255,255,.5)',font:{size:10}},grid:{display:false}},
              y:{ticks:{color:'rgba(255,255,255,.4)',font:{size:10}},grid:{color:'rgba(255,255,255,.05)'}}}}});
}

// ── Navegação de abas ──
function showTab(name,elem){
  document.querySelectorAll('.content').forEach(c=>c.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
  if(elem) elem.classList.add('active');
}

loadData();
