<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Debug · Pipeline Imersão Claude</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:'DM Sans',-apple-system,system-ui,sans-serif}
body{background:#1a1a2e;color:#e8e6f0;padding:20px;min-height:100vh}
h1{color:#ff6b2b;font-size:18px;margin-bottom:8px}
.sub{color:rgba(255,255,255,.4);font-size:12px;margin-bottom:16px}
.btn{background:#ff6b2b;color:#fff;border:none;padding:8px 16px;border-radius:6px;cursor:pointer;font-weight:600;margin-right:8px}
.btn:hover{background:#ff8c4d}
.tab-sel{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap}
.tab-sel button{background:#12121f;color:rgba(255,255,255,.6);border:1px solid rgba(255,255,255,.1);padding:6px 14px;border-radius:6px;cursor:pointer;font-size:12px}
.tab-sel button.active{background:rgba(255,107,43,.2);color:#ff6b2b;border-color:#ff6b2b}
.box{background:#12121f;border:1px solid rgba(255,255,255,.07);border-radius:10px;padding:16px;margin-bottom:14px}
.box h2{font-size:13px;color:#ff6b2b;margin-bottom:8px}
.kpi{display:flex;gap:18px;flex-wrap:wrap;margin-bottom:8px}
.kpi div{font-size:12px;color:rgba(255,255,255,.6)}
.kpi b{color:#fff;font-family:'DM Mono',monospace;font-size:14px;display:block;margin-top:2px}
table{width:100%;border-collapse:collapse;font-size:11px;font-family:'DM Mono',monospace}
th{background:#1a1a2e;color:rgba(255,255,255,.5);text-align:left;padding:6px 8px;border-bottom:1px solid rgba(255,255,255,.1);position:sticky;top:0;font-weight:500;white-space:nowrap}
td{padding:6px 8px;border-bottom:1px solid rgba(255,255,255,.04);max-width:280px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:#e8e6f0}
tr:hover td{background:rgba(255,255,255,.03)}
.passa{background:rgba(46,204,113,.08)!important}
.morre{background:rgba(231,76,60,.06)!important}
.morre td:first-child::before{content:"❌ "}
.passa td:first-child::before{content:"✅ "}
.scroll{overflow:auto;max-height:600px;border:1px solid rgba(255,255,255,.05);border-radius:6px}
.search{background:rgba(255,255,255,.06);color:#fff;border:1px solid rgba(255,255,255,.1);padding:6px 10px;border-radius:6px;font-size:12px;width:300px;margin-bottom:8px}
</style>
</head>
<body>
<h1>🔍 Debug · Pipeline Imersão Claude</h1>
<div class="sub">Lê as 5 abas direto da planilha (sem cache) e mostra cada linha + se passou nos filtros. <a href="index.html" style="color:#ff6b2b">← voltar pro dashboard</a></div>
<button class="btn" onclick="run()">↻ Recarregar dados</button>
<input type="text" class="search" id="search" placeholder="Buscar (ex: Romario, ICM-ADV103, 04/05)..." oninput="renderTable()">
<div class="tab-sel" id="tabs"></div>
<div id="output"></div>
<script>
const SHEET_ID='1C2Xvdg3ORGIeRobxluq7vEZVEqjsW-uNHbIYhr8g02w';
const ABAS = ['Gerenciador','Webhook','vendas','vendas_eduzz','webhook_eduzz'];
let dados = {}; let activeAba = 'webhook_eduzz';
function parseCSV(csv){const lines=[];let cur='',inQ=false;for(let i=0;i<csv.length;i++){const c=csv[i];if(c==='"'){inQ=!inQ;cur+=c;}else if(c==='\n'&&!inQ){lines.push(cur);cur='';}else{cur+=c;}}if(cur.trim())lines.push(cur);return lines.map(line=>{const cols=[];let val='',q=false;for(let i=0;i<line.length;i++){const c=line[i];if(c==='"'){q=!q;}else if(c===','&&!q){cols.push(val.trim());val='';}else{val+=c;}}cols.push(val.trim());return cols;});}
function normKey(s){return String(s||'').toLowerCase().replace(/[\s_-]/g,'');}
function parseVal(raw){if(raw==null)return 0;let s=String(raw).replace(/r\$\s?/i,'').replace(/"/g,'').trim();if(!s)return 0;if(s.includes(','))return parseFloat(s.replace(/\./g,'').replace(',','.'))||0;return parseFloat(s)||0;}
async function run(){
  document.getElementById('output').innerHTML='<div class="box">Carregando...</div>';
  for(const aba of ABAS){
    try{const url=`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(aba)}&_=${Date.now()}`;const r=await fetch(url,{cache:'no-store'});const t=await r.text();dados[aba]={rows:parseCSV(t)};}
    catch(e){dados[aba]={rows:[],err:e.message};}
  }
  renderTabs(); renderTable();
}
function renderTabs(){document.getElementById('tabs').innerHTML=ABAS.map(a=>{const n=(dados[a]?.rows?.length||1)-1;return `<button class="${a===activeAba?'active':''}" onclick="setAba('${a}')">${a} (${n})</button>`;}).join('');}
function setAba(a){activeAba=a;renderTabs();renderTable();}
function renderTable(){
  const search=document.getElementById('search').value.toLowerCase();
  const d=dados[activeAba];
  if(!d||!d.rows||d.rows.length<1){document.getElementById('output').innerHTML='<div class="box">Sem dados</div>';return;}
  const header=d.rows[0];
  const dataRows=d.rows.slice(1).filter(r=>r[0]||r[1]||r[2]);
  const filtered=search?dataRows.filter(r=>r.some(c=>String(c||'').toLowerCase().includes(search))):dataRows;
  let keyCols=[]; let analyze=(r)=>({passa:true,motivo:'—'});
  const I=n=>header.indexOf(n);
  if(activeAba==='webhook_eduzz'){
    const valor=I('trans_value'),status=I('trans_status'),paid=I('trans_paiddate'),nome=I('cus_name');
    const src=I('utm_source')>=0?I('utm_source'):I('tracker_utm_source');
    const med=I('utm_medium')>=0?I('utm_medium'):I('tracker_utm_medium');
    const cont=I('utm_content')>=0?I('utm_content'):I('tracker_utm_content');
    keyCols=[{label:'cus_name',idx:nome},{label:'trans_value',idx:valor},{label:'trans_paiddate',idx:paid},{label:'trans_status',idx:status},{label:'utm_source',idx:src},{label:'utm_medium',idx:med},{label:'utm_content',idx:cont}];
    analyze=(r)=>{const m=[];const v=parseVal(r[valor]);const st=String(r[status]||'').toLowerCase().trim();const cancel=['3','8','9','cancelled','canceled','cancelada','refunded','reembolsada','chargeback','estornada'].includes(st);if(v<=0)m.push(`trans_value="${r[valor]}" é zero/vazio`);if(cancel)m.push(`status="${st}" cancelamento`);return m.length?{passa:false,motivo:m.join(' | ')}:{passa:true,motivo:'OK (valor>0 + não cancelada)'};};
  }else if(activeAba==='vendas_eduzz'){
    const status=I('Status'),src=I('UTM Source'),med=I('UTM Medium'),camp=I('UTM Campaign'),cli=I('Cliente / Nome'),val=I('Valor da Venda'),dt=I('Data de Pagamento');
    keyCols=[{label:'Cliente',idx:cli},{label:'Valor',idx:val},{label:'Data Pag',idx:dt},{label:'Status',idx:status},{label:'UTM Source',idx:src},{label:'UTM Medium',idx:med},{label:'UTM Campaign',idx:camp}];
    analyze=(r)=>{const m=[];const st=String(r[status]||'').toLowerCase().trim();const me=(r[med]||'').toLowerCase(),ca=(r[camp]||'').toLowerCase();if(st!=='paga')m.push(`Status="${r[status]}" ≠ Paga`);if(!r[src]||normKey(r[src])!=='metaads')m.push(`UTM Source="${r[src]}" ≠ meta_ads`);if(!me.includes('claude')&&!ca.includes('claude'))m.push('sem "claude"');return m.length?{passa:false,motivo:m.join(' | ')}:{passa:true,motivo:'OK'};};
  }else if(activeAba==='Webhook'){
    const lower=header.map(h=>h.toLowerCase());
    const ix={data:lower.indexOf('data'),status:lower.indexOf('status'),source:lower.indexOf('source'),campaign:lower.indexOf('campaign'),valor:lower.indexOf('valor'),medium:lower.indexOf('medium'),nome:lower.indexOf('nome')};
    keyCols=Object.entries(ix).filter(([k,v])=>v>=0).map(([k,v])=>({label:k,idx:v}));
    analyze=(r)=>{const m=[];if(r[ix.status]?.toLowerCase().trim()!=='paid')m.push(`Status="${r[ix.status]}" ≠ paid`);if(!r[ix.source]||normKey(r[ix.source])!=='metaads')m.push(`Source="${r[ix.source]}" ≠ meta_ads`);const me=(r[ix.medium]||'').toLowerCase(),ca=(r[ix.campaign]||'').toLowerCase();if(!me.includes('claude')&&!ca.includes('claude'))m.push('sem "claude"');return m.length?{passa:false,motivo:m.join(' | ')}:{passa:true,motivo:'OK'};};
  }else{keyCols=header.map((h,i)=>({label:h.slice(0,20),idx:i})).slice(0,8);}
  const passou=filtered.filter(r=>analyze(r).passa).length;
  let html=`<div class="box"><h2>${activeAba}</h2><div class="kpi"><div>Linhas brutas <b>${dataRows.length}</b></div><div>Filtradas (busca) <b>${filtered.length}</b></div><div>Passa filtro <b style="color:#2ecc71">${passou}</b></div><div>Rejeitadas <b style="color:#e74c3c">${filtered.length-passou}</b></div><div>Colunas <b>${header.length}</b></div></div></div>`;
  html+=`<div class="scroll"><table><thead><tr><th>#</th><th>🚦 motivo</th>${keyCols.map(k=>`<th>${k.label}</th>`).join('')}</tr></thead><tbody>`;
  filtered.forEach((r,i)=>{const a=analyze(r);html+=`<tr class="${a.passa?'passa':'morre'}"><td>${i+2}</td><td>${a.motivo}</td>${keyCols.map(k=>{const v=k.idx>=0?(r[k.idx]||''):'?';return `<td title="${String(v).replace(/"/g,'&quot;')}">${String(v).slice(0,80)}</td>`;}).join('')}</tr>`;});
  html+='</tbody></table></div>';
  document.getElementById('output').innerHTML=html;
}
document.addEventListener('DOMContentLoaded', run);
</script>
</body>
</html>
