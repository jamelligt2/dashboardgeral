<script>
// ╔══════════════════════════════════════════════════════════════════╗
// ║           CONFIGURAÇÃO DO CLIENTE — EDITE APENAS AQUI           ║
// ╚══════════════════════════════════════════════════════════════════╝
const CONFIG = {
  CLIENTE:  'Elaine',
  PRODUTO:  'SOS Preciosa',
  ANO:      '2026',
  SHEET_ID: '12gd7ymSh-s960DhRDtxYMSgv5B7NBvRVHcn37M_5O_A',
  GERENCIADOR_SHEET: 'Gerenciador',
  WEBHOOK_SHEET:     'Webhook',         // vendas em tempo real (webhook Eduzz)
  DATA_MINIMA:       '2026-06-01',
  PRODUTO_NOME:      'sos preciosa',
  PRODUTO_PRECO_MINIMO: 0,
  VALORES_EM_CENTAVOS: false,
  STATUS_APROVADO: ['PAID','PAGA','PAGO','APPROVED','COMPLETE','CONFIRMED','APROVADA','COMPLETA'],
  SPLIT_SOCIO_PCT: 0.5,                 // sociedade 50/50
  PRIMEIRO_VENCIMENTO: '2026-07-19',    // ciclo fecha dia 19; 1º vencimento

  // ── Custos do modelo (edite aqui) ─────────────────────────────────
  TAXAS: {
    eduzzFixo:   2.49,   // R$ por venda
    eduzzPct:    0.043,  // 4,3% sobre o valor da venda
    impostoPct:  0.08,   // 8% sobre o valor do produto
    sellfluxMes: 0,      // feito por fora
    notaMes:     0,      // feito por fora
  },

  // Colunas Gerenciador (0-based)
  G: { date:0, inv:1, cliques:2, pv:3, ck:4, purch:5, adset:6, ad:7, reach:8, link:9, campaign:10, imp:11 },
  // Colunas Webhook / Eduzz (0-based)
  W: { status:3, event:1, txId:63, data:62, dataAlt:28, produto:39, valorProduto:44, valorProdutoAlt:31,
       fatTotal:33, fatAlt:60, cliente:5, email:7,
       utmSource:23, utmCampaign:24, utmMedium:25, utmContent:26 },
};
const SHEET_ID = CONFIG.SHEET_ID, G = CONFIG.G, W = CONFIG.W;

// ── Estado global ───────────────────────────────────────────────────
let GROWS = [];   // linhas brutas do Gerenciador (objetos)
let SALES = [];   // vendas processadas
let DIAS  = [];   // agregado diário do Gerenciador
let ACTIVE_ADS = new Set(), ACTIVE_ADSETS = new Set();
let CHARTS = {};

// ── Helpers ─────────────────────────────────────────────────────────
function num(v){
  if(v==null) return 0;
  let s=String(v).trim(); if(s==='') return 0;
  if(/[eE]/.test(s.replace(',','.')) && /\d[eE][+\-]?\d/.test(s.replace(',','.')))
    return parseFloat(s.replace(',','.'))||0;
  if(s.indexOf(',')>-1) s=s.replace(/\./g,'').replace(',', '.');
  return parseFloat(s)||0;
}
function isoDate(s){
  s=String(s||'').trim(); if(!s) return '';
  let m=s.match(/(\d{4})-(\d{2})-(\d{2})/); if(m) return `${m[1]}-${m[2]}-${m[3]}`;
  m=s.match(/(\d{2})\/(\d{2})\/(\d{4})/); if(m) return `${m[3]}-${m[2]}-${m[1]}`;
  return '';
}
const brl = v => 'R$ '+(v||0).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});
const brl0 = v => 'R$ '+Math.round(v||0).toLocaleString('pt-BR');
const intf = v => (v||0).toLocaleString('pt-BR');
const pct = v => (isFinite(v)&&v>0 ? v.toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2})+'%' : '—');
const dash = (v,fmt) => (isFinite(v)&&v>0) ? (fmt?fmt(v):v) : '—';
const isTrafego = s => (s.utmSource||'').toLowerCase().replace(/[\s_\-]/g,'') === 'metaads';
const fmtD = iso => { if(!iso) return '—'; const [y,m,d]=iso.split('-'); return `${d}/${m}`; };

// CSV parser (lida com aspas e vírgulas internas)
function parseCSV(text){
  const rows=[]; let row=[], cur='', q=false;
  for(let i=0;i<text.length;i++){
    const c=text[i];
    if(q){
      if(c==='"'){ if(text[i+1]==='"'){cur+='"';i++;} else q=false; }
      else cur+=c;
    } else {
      if(c==='"') q=true;
      else if(c===','){ row.push(cur); cur=''; }
      else if(c==='\n'){ row.push(cur); rows.push(row); row=[]; cur=''; }
      else if(c==='\r'){}
      else cur+=c;
    }
  }
  if(cur!==''||row.length){ row.push(cur); rows.push(row); }
  return rows;
}

async function fetchSheetCSV(sheetName){
  const url=`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(sheetName)}`;
  const controller=new AbortController();
  const timeout=setTimeout(()=>controller.abort(),20000);
  try{
    const resp=await fetch(url,{signal:controller.signal});
    clearTimeout(timeout);
    if(!resp.ok) throw new Error(`Planilha "${sheetName}": HTTP ${resp.status}. Verifique se está pública.`);
    const text=await resp.text();
    if(text.includes('Signin')||text.includes('accounts.google'))
      throw new Error(`Planilha "${sheetName}" requer login. Defina como pública.`);
    return text;
  }catch(e){
    clearTimeout(timeout);
    if(e.name==='AbortError') throw new Error(`Timeout ao carregar "${sheetName}".`);
    throw e;
  }
}

// ── Carregamento e processamento ────────────────────────────────────
async function loadData(){
  const ov=document.getElementById('loading-overlay');
  ov.style.display='flex';
  document.getElementById('loading-msg').textContent='Conectando com a planilha...';
  try{
    const [gTxt,sTxt]=await Promise.all([
      fetchSheetCSV(CONFIG.GERENCIADOR_SHEET),
      fetchSheetCSV(CONFIG.WEBHOOK_SHEET),
    ]);
    const gRows=parseCSV(gTxt).slice(1).filter(r=>r.length>3 && r[G.date]);
    const sRows=parseCSV(sTxt).slice(1).filter(r=>r.length>40 && r[W.produto]);

    // Webhook / Vendas
    const statusOK = st => CONFIG.STATUS_APROVADO.includes((st||'').trim().toUpperCase());
    const T=CONFIG.TAXAS, seen=new Set();
    SALES = sRows.map(r=>{
      const fat  = num(r[W.fatTotal]) || num(r[W.fatAlt]);
      const prod = num(r[W.valorProduto]) || num(r[W.valorProdutoAlt]) || fat;
      const eduzzV = T.eduzzFixo + (fat - T.eduzzFixo)*T.eduzzPct;
      const liq = fat - eduzzV - prod*T.impostoPct;   // líquido estimado (Webhook não traz coluna)
      const cent = CONFIG.VALORES_EM_CENTAVOS;
      return {
        data: isoDate(r[W.data]) || isoDate(r[W.dataAlt]),
        txId:(r[W.txId]||'').trim(),
        nome:(r[W.cliente]||'').trim(),
        email:(r[W.email]||'').trim(),
        produto:(r[W.produto]||'').trim(),
        status:(r[W.status]||'').trim(),
        fatTotal: cent? fat/100 : fat,
        valorProduto: cent? prod/100 : prod,
        liquido: cent? liq/100 : liq,
        utmSource:(r[W.utmSource]||'').trim(),
        utmCampaign:(r[W.utmCampaign]||'').trim(),
        utmMedium:(r[W.utmMedium]||'').trim(),
        utmContent:(r[W.utmContent]||'').trim(),
      };
    }).filter(s=>{
      if(!(s.data && s.data>=CONFIG.DATA_MINIMA)) return false;
      if(!statusOK(s.status)) return false;
      if(!s.produto.toLowerCase().includes(CONFIG.PRODUTO_NOME)) return false;
      if(s.fatTotal<CONFIG.PRODUTO_PRECO_MINIMO) return false;
      const k=s.txId||(s.email+'|'+s.data); if(seen.has(k)) return false; seen.add(k);
      return true;
    });
    SALES.forEach(s=>{ s.criativo=s.utmContent||'(sem criativo)'; s.publico=s.utmCampaign||'(sem público)'; s.traf=isTrafego(s); });
    SALES.sort((a,b)=>b.data.localeCompare(a.data));

    // Agregado diário
    const dmap={};
    GROWS.forEach(g=>{ const d=dmap[g.data]||(dmap[g.data]={data:g.data,inv:0,cliques:0,pv:0,ck:0,purch:0,imp:0,reach:0});
      d.inv+=g.inv; d.cliques+=g.cliques; d.pv+=g.pv; d.ck+=g.ck; d.purch+=g.purch; d.imp+=g.imp; d.reach+=g.reach; });
    DIAS=Object.values(dmap).sort((a,b)=>a.data.localeCompare(b.data));

    // "Ativo": teve investimento na última data com dados do Gerenciador
    const lastG = GROWS.map(g=>g.data).sort().slice(-1)[0]||'';
    ACTIVE_ADS=new Set(); ACTIVE_ADSETS=new Set();
    GROWS.filter(g=>g.data===lastG && g.inv>0).forEach(g=>{ ACTIVE_ADS.add(g.ad); ACTIVE_ADSETS.add(g.adset); });

    initDateInputs();
    ov.style.display='none';
    onDateChange();
  }catch(e){
    ov.style.display='none';
    document.querySelectorAll('.content').forEach(c=>c.innerHTML='');
    document.getElementById('trafego').innerHTML=`<div class="err-box">⚠️ ${e.message}</div>`;
  }
}

function allDatesSorted(){
  return [...DIAS.map(d=>d.data), ...SALES.map(s=>s.data)].filter(Boolean).sort();
}
function initDateInputs(){
  const a=allDatesSorted(); if(!a.length) return;
  document.getElementById('dateFrom').value=a[0];
  document.getElementById('dateTo').value=a[a.length-1];
}
function setPreset(days,btn){
  document.querySelectorAll('.preset-btn').forEach(b=>b.classList.remove('active'));
  if(btn) btn.classList.add('active');
  const a=allDatesSorted(); if(!a.length) return;
  const last=a[a.length-1];
  if(days==='all'){ document.getElementById('dateFrom').value=a[0]; document.getElementById('dateTo').value=last; }
  else { const d=new Date(last+'T00:00:00'); d.setDate(d.getDate()-(days-1));
    document.getElementById('dateFrom').value=d.toISOString().slice(0,10);
    document.getElementById('dateTo').value=last; }
  onDateChange();
}
function onDateChange(){
  const from=document.getElementById('dateFrom').value, to=document.getElementById('dateTo').value;
  document.getElementById('range-info').textContent = from&&to? `${fmtD(from)} → ${fmtD(to)}` : '';
  renderTrafego(from,to); renderVisao(from,to);
  renderCriativos(); renderPublicos();
  renderSemanal(from,to); renderMensal(from,to); renderCaixa(from,to); renderSimulador();
}
function inRange(d,from,to){ return (!from||d>=from)&&(!to||d<=to); }

// Agrega Gerenciador no período
function aggG(from,to){
  const r={inv:0,cliques:0,pv:0,ck:0,purch:0,imp:0,reach:0};
  GROWS.filter(g=>inRange(g.data,from,to)).forEach(g=>{
    r.inv+=g.inv; r.cliques+=g.cliques; r.pv+=g.pv; r.ck+=g.ck; r.purch+=g.purch; r.imp+=g.imp; r.reach+=g.reach; });
  return r;
}
function salesIn(from,to){ return SALES.filter(s=>inRange(s.data,from,to)); }

// ── ABA TRÁFEGO ─────────────────────────────────────────────────────
function renderTrafego(from,to){
  const g=aggG(from,to), fs=salesIn(from,to);
  const traf=fs.filter(s=>s.traf), org=fs.filter(s=>!s.traf);
  const fatTraf=traf.reduce((a,s)=>a+s.fatTotal,0), fatOrg=org.reduce((a,s)=>a+s.fatTotal,0);
  const roas=g.inv>0? fatTraf/g.inv : 0;
  const cac=traf.length? g.inv/traf.length : 0;
  const ticket=traf.length? fatTraf/traf.length : 0;
  const cpc=g.cliques? g.inv/g.cliques : 0;
  const cpm=g.imp? g.inv/g.imp*1000 : 0;
  const ctr=g.imp? g.cliques/g.imp*100 : 0;

  const kpis=[
    ['Investimento (Meta)',brl(g.inv),'orange',''],
    ['Fat. Tráfego',brl(fatTraf),'green',traf.length+' vendas'],
    ['Fat. Orgânico',brl(fatOrg),'yellow',org.length+' vendas'],
    ['ROAS Tráfego',dash(roas,v=>v.toFixed(2)+'x'),'green',''],
    ['CAC',dash(cac,brl),'orange',''],
    ['Ticket Médio',dash(ticket,brl),'blue',''],
    ['Cliques',intf(g.cliques),'',''],
    ['Impressões',intf(g.imp),'',''],
    ['CPC',dash(cpc,brl),'',''],
    ['CPM',dash(cpm,brl),'',''],
    ['CTR',pct(ctr),'',''],
    ['Alcance',intf(g.reach),'',''],
  ];
  // Funil
  const fEt=[['Cliques',g.cliques],['Page Views',g.pv],['Checkouts',g.ck],['Compras',traf.length||g.purch]];
  const fMax=Math.max(...fEt.map(e=>e[1]),1);

  let h=`<div class="kpi-grid">${kpis.map(k=>`
    <div class="kpi-card"><div class="kpi-label">${k[0]}</div>
    <div class="kpi-value ${k[2]}">${k[1]}</div>${k[3]?`<div class="kpi-sub">${k[3]}</div>`:''}</div>`).join('')}</div>`;

  h+=`<div class="funil-section">
    <div class="chart-card"><h4>Funil — Tráfego pago</h4>
      ${fEt.map((e,i)=>{const p=(e[1]/fMax*100);const conv=i>0&&fEt[i-1][1]>0?(e[1]/fEt[i-1][1]*100):null;
        return `<div class="funil-bar-wrap"><div class="funil-label"><span>${e[0]}</span><span>${intf(e[1])}${conv!=null?` · ${conv.toFixed(1)}%`:''}</span></div>
        <div class="funil-bar-bg"><div class="funil-bar-fill" style="width:${p}%"></div></div></div>`;}).join('')}
    </div>
    <div class="chart-card"><h4>Indicadores-chave</h4><div class="taxa-grid">
      <div class="taxa-item"><span>Conversão PageView → compra</span><span class="taxa-val">${pct(g.pv?(traf.length/g.pv*100):0)}</span></div>
      <div class="taxa-item"><span>Lucro do tráfego (Fat − Invest.)</span><span class="taxa-val">${brl(fatTraf-g.inv)}</span></div>
      <div class="taxa-item"><span>Part. tráfego no faturamento</span><span class="taxa-val">${pct((fatTraf+fatOrg)?(fatTraf/(fatTraf+fatOrg)*100):0)}</span></div>
      <div class="taxa-item"><span>Vendas no período</span><span class="taxa-val">${fs.length}</span></div>
    </div></div>
  </div>`;

  h+=`<div class="sec-title">Compradores no período (${fs.length})</div><div class="sales-scroll">`;
  if(!fs.length) h+=`<div class="sale-meta">Nenhuma venda no período.</div>`;
  fs.forEach(s=>{ h+=`<div class="sale-card ${s.traf?'traf':'org'}">
    <div class="sale-top"><div class="sale-name">${s.nome||'—'}</div><div class="sale-val">${brl(s.fatTotal)}</div></div>
    <div class="sale-meta">${s.traf?'✅ Tráfego':'⭐ Orgânico'} · ${fmtD(s.data)}<br>
    🎬 ${s.criativo} · 👥 ${s.publico}<br>💧 Líquido: ${brl(s.liquido)}</div></div>`; });
  h+=`</div>`;
  document.getElementById('trafego').innerHTML=h;
}

// ── ABA VISÃO GERAL ─────────────────────────────────────────────────
function renderVisao(from,to){
  const g=aggG(from,to), fs=salesIn(from,to);
  const fat=fs.reduce((a,s)=>a+s.fatTotal,0);
  const traf=fs.filter(s=>s.traf), org=fs.filter(s=>!s.traf);
  const roas=g.inv?fat/g.inv:0, ticket=fs.length?fat/fs.length:0, cac=fs.length?g.inv/fs.length:0;
  const kpis=[
    ['Investimento',brl(g.inv),'orange'],['Fat. Total',brl(fat),'green'],
    ['ROAS Total',dash(roas,v=>v.toFixed(2)+'x'),'green'],['Vendas Total',fs.length,''],
    ['Tráfego',traf.length,'green'],['Orgânicas',org.length,'yellow'],
    ['Ticket Médio',dash(ticket,brl),'blue'],['CAC Total',dash(cac,brl),'orange'],
  ];
  let h=`<div class="kpi-grid">${kpis.map(k=>`<div class="kpi-card"><div class="kpi-label">${k[0]}</div><div class="kpi-value ${k[2]}">${k[1]}</div></div>`).join('')}</div>`;

  // dia a dia
  const days={};
  DIAS.filter(d=>inRange(d.data,from,to)).forEach(d=>days[d.data]=days[d.data]||{data:d.data,inv:0,fat:0,n:0,traf:0,org:0});
  Object.values(days).forEach(d=>{ const dd=DIAS.find(x=>x.data===d.data); if(dd) d.inv=dd.inv; });
  fs.forEach(s=>{ const d=days[s.data]||(days[s.data]={data:s.data,inv:0,fat:0,n:0,traf:0,org:0});
    d.fat+=s.fatTotal; d.n++; s.traf?d.traf++:d.org++; });
  const arr=Object.values(days).sort((a,b)=>b.data.localeCompare(a.data));
  h+=`<div class="sec-title">Dia a dia</div><div class="tbl-wrap"><table><thead><tr>
    <th>Data</th><th>Invest.</th><th>Fat. Total</th><th>ROAS</th><th>Compras</th><th>Tráfego</th><th>Orgânicas</th><th>Ticket</th><th>CAC</th></tr></thead><tbody>`;
  arr.forEach(d=>{ const r=d.inv?d.fat/d.inv:0; h+=`<tr><td>${fmtD(d.data)}</td><td>${brl(d.inv)}</td><td>${brl(d.fat)}</td>
    <td class="${r>=1?'green':'red'}">${dash(r,v=>v.toFixed(2)+'x')}</td><td>${d.n}</td><td>${d.traf}</td><td>${d.org}</td>
    <td>${d.n?brl(d.fat/d.n):'—'}</td><td>${d.n?brl(d.inv/d.n):'—'}</td></tr>`; });
  if(!arr.length) h+=`<tr><td colspan="9" style="text-align:center;color:rgba(255,255,255,.3)">Sem dados no período</td></tr>`;
  h+=`</tbody></table></div>`;
  document.getElementById('visao').innerHTML=h;
}

// ── CRIATIVOS / PÚBLICOS (recalculam do zero por data) ──────────────
function buildCriPubMaps(from,to){
  const cri={}, pub={};
  GROWS.filter(g=>inRange(g.data,from,to)).forEach(g=>{
    const c=cri[g.ad]||(cri[g.ad]={nome:g.ad,inv:0,cliques:0,imp:0,pv:0,ck:0,reach:0,link:g.link,vendas:0,fat:0});
    c.inv+=g.inv; c.cliques+=g.cliques; c.imp+=g.imp; c.pv+=g.pv; c.ck+=g.ck; c.reach+=g.reach; if(g.link)c.link=g.link;
    const p=pub[g.adset]||(pub[g.adset]={nome:g.adset,inv:0,cliques:0,imp:0,pv:0,ck:0,reach:0,vendas:0,fat:0});
    p.inv+=g.inv; p.cliques+=g.cliques; p.imp+=g.imp; p.pv+=g.pv; p.ck+=g.ck; p.reach+=g.reach;
  });
  salesIn(from,to).forEach(s=>{
    if(cri[s.criativo]){ cri[s.criativo].vendas++; cri[s.criativo].fat+=s.fatTotal; }
    if(pub[s.publico]){ pub[s.publico].vendas++; pub[s.publico].fat+=s.fatTotal; }
  });
  return {cri:Object.values(cri), pub:Object.values(pub)};
}

// ── SEMANA A SEMANA / MÊS A MÊS ─────────────────────────────────────
function weekKey(iso){ const d=new Date(iso+'T00:00:00'); const day=(d.getDay()+6)%7; d.setDate(d.getDate()-day);
  return d.toISOString().slice(0,10); }
function monthKey(iso){ return iso.slice(0,7); }
function buildPeriod(from,to,keyFn){
  const m={};
  DIAS.filter(d=>inRange(d.data,from,to)).forEach(d=>{ const k=keyFn(d.data);
    const o=m[k]||(m[k]={k,inv:0,cliques:0,imp:0,pv:0,fat:0,vendas:0}); o.inv+=d.inv; o.cliques+=d.cliques; o.imp+=d.imp; o.pv+=d.pv; });
  salesIn(from,to).forEach(s=>{ const k=keyFn(s.data); const o=m[k]||(m[k]={k,inv:0,cliques:0,imp:0,pv:0,fat:0,vendas:0}); o.fat+=s.fatTotal; o.vendas++; });
  return Object.values(m).sort((a,b)=>a.k.localeCompare(b.k));
}
function renderPeriodTab(elId,arr,labelFn,chartPrefix){

  arr.forEach(o=>{ const ctr=o.imp?o.cliques/o.imp*100:0, roas=o.inv?o.fat/o.inv:0, conv=o.pv?o.vendas/o.pv*100:0, cac=o.vendas?o.inv/o.vendas:0;
    h+=`<tr><td>${labelFn(o.k)}</td><td>${brl(o.inv)}</td><td>${intf(o.cliques)}</td><td>${intf(o.imp)}</td>
    <td>${pct(ctr)}</td><td>${pct(conv)}</td><td>${brl(o.fat)}</td><td>${o.vendas}</td><td>${dash(cac,brl)}</td><td class="${roas>=1?'green':''}">${dash(roas,v=>v.toFixed(2)+'x')}</td></tr>`; });
  if(!arr.length) h+=`<tr><td colspan="10" style="text-align:center;color:rgba(255,255,255,.3)">Sem dados no período</td></tr>`;

  drawBar(chartPrefix+'Inv', labels, arr.map(o=>o.inv), 'rgba(255,107,43,0.85)');

  drawBar(chartPrefix+'Roas',labels, arr.map(o=>o.inv?o.fat/o.inv:0), 'rgba(255,140,60,0.85)');
  drawBar(chartPrefix+'Cac', labels, arr.map(o=>o.vendas?o.inv/o.vendas:0), 'rgba(255,107,43,0.85)');
  drawBar(chartPrefix+'Ctr', labels, arr.map(o=>o.imp?o.cliques/o.imp*100:0), 'rgba(255,183,55,0.85)');
  drawBar(chartPrefix+'Conv',labels, arr.map(o=>o.pv?o.vendas/o.pv*100:0), 'rgba(255,160,50,0.85)');
}

// ── ABA CAIXA & REINVESTIMENTO ──────────────────────────────────────
// Ciclo fecha todo dia 19; CONFIG.PRIMEIRO_VENCIMENTO ancora o 1º fechamento.
function nextDay19(iso){
  let [y,m,d]=iso.split('-').map(Number);
  if(d>=19){ m++; if(m>12){m=1;y++;} }
  return `${y}-${String(m).padStart(2,'0')}-19`;
}
function vencOf(iso){
  let v=nextDay19(iso);
  if(v<CONFIG.PRIMEIRO_VENCIMENTO) v=CONFIG.PRIMEIRO_VENCIMENTO;
  return v;
}
function prevMonth19(iso){ let [y,m]=iso.split('-').map(Number); m--; if(m<1){m=12;y--;} return `${y}-${String(m).padStart(2,'0')}-19`; }
function minus1day(iso){ const d=new Date(iso+'T00:00:00'); d.setDate(d.getDate()-1); return d.toISOString().slice(0,10); }
const fmtFull = iso => { const [y,m,d]=iso.split('-'); return `${d}/${m}/${y.slice(2)}`; };

// Calcula todos os ciclos sobre TODA a base, p/ o bolo ser o valor real acumulado.
function computeCycles(){
  const T=CONFIG.TAXAS, m={};
  SALES.forEach(s=>{ const c=vencOf(s.data); (m[c]||(m[c]={c,fat:0,prod:0,n:0,inv:0})); m[c].fat+=s.fatTotal; m[c].prod+=s.valorProduto; m[c].n++; });
  DIAS.forEach(d=>{ const c=vencOf(d.data); (m[c]||(m[c]={c,fat:0,prod:0,n:0,inv:0})); m[c].inv+=d.inv; });
  const arr=Object.values(m).sort((a,b)=>a.c.localeCompare(b.c));
  const earliest=[...SALES.map(s=>s.data),...DIAS.map(d=>d.data)].filter(Boolean).sort()[0]||'';
  let bolo=0;
  arr.forEach((o,i)=>{
    o.eduzz = o.n*T.eduzzFixo + (o.fat - o.n*T.eduzzFixo)*T.eduzzPct;
    o.imposto = o.prod*T.impostoPct;
    o.ferr = T.sellfluxMes + T.notaMes;
    o.liquidoVendas = o.fat - o.eduzz - o.imposto;
    o.cresc = o.liquidoVendas - o.ferr - o.inv;
    bolo += o.cresc; o.bolo = bolo;
    let ini = prevMonth19(o.c);
    if(i===0 && earliest && earliest<ini) ini=earliest;
    o.ini=ini; o.fim=minus1day(o.c);
  });
  return arr;
}

function renderCaixa(from,to){
  const T=CONFIG.TAXAS;
  const g=aggG(from,to), fs=salesIn(from,to);
  const n=fs.length;
  const fat=fs.reduce((a,s)=>a+s.fatTotal,0);
  const baseProd=fs.reduce((a,s)=>a+s.valorProduto,0);
  const invest=g.inv;
  const eduzz = n*T.eduzzFixo + (fat - n*T.eduzzFixo)*T.eduzzPct;   // R$2,49/venda + 4,3% s/ (bruto−2,49)
  const imposto = baseProd*T.impostoPct;                            // 8% s/ valor do produto
  const ciclosSet=new Set(); fs.forEach(s=>ciclosSet.add(vencOf(s.data)));
  DIAS.filter(d=>inRange(d.data,from,to)).forEach(d=>ciclosSet.add(vencOf(d.data)));
  const meses=Math.max(ciclosSet.size,1);
  const custoSellflux=T.sellfluxMes*meses, custoNota=T.notaMes*meses, custosMensais=custoSellflux+custoNota;
  const liquidoVendas=fat-eduzz-imposto;
  const liquido=liquidoVendas-custosMensais;
  const saldo=liquido-invest;
  const pctS=CONFIG.SPLIT_SOCIO_PCT;

  const cycles=computeCycles();
  const boloTotal=cycles.length?cycles[cycles.length-1].bolo:0;

  let h=`<div class="caixa-banner">💰 <b>Caixa &amp; Reinvestimento</b> — o ciclo fecha todo dia <b>19</b> (1º vencimento ${fmtFull(CONFIG.PRIMEIRO_VENCIMENTO)}).
    Líquido = bruto − Eduzz (R$ ${T.eduzzFixo.toFixed(2)}/venda + ${(T.eduzzPct*100).toFixed(1)}% sobre o bruto menos R$ ${T.eduzzFixo.toFixed(2)})
    − imposto (${(T.impostoPct*100).toFixed(0)}% s/ produto) − ferramentas por ciclo (SellFlux R$ ${T.sellfluxMes} + nota R$ ${T.notaMes}).
    A meta é o <b>bolo crescer</b> a cada ciclo reinvestindo o líquido.</div>`;

  const kpis=[
    ['Bolo acumulado (real)',brl(boloTotal),boloTotal>=0?'green':'red','toda a base'],
    ['Faturamento bruto',brl(fat),'green',n+' vendas'],
    ['Líquido de vendas',brl(liquidoVendas),'green','− Eduzz − imposto'],
    ['Investido em mídia',brl(invest),'orange','reinvestido'],
    ['Saldo do período',brl(saldo),saldo>=0?'green':'red','− ferr. − mídia'],
    ['Margem líquida',pct(fat?liquido/fat*100:0),'blue','sobre o bruto'],
  ];
  h+=`<div class="kpi-grid">${kpis.map(k=>`<div class="kpi-card"><div class="kpi-label">${k[0]}</div>
    <div class="kpi-value ${k[2]}">${k[1]}</div>${k[3]?`<div class="kpi-sub">${k[3]}</div>`:''}</div>`).join('')}</div>`;

  // Cascata do período filtrado
  const linhas=[
    ['Faturamento bruto', fat, 'green', `${n} vendas`],
    ['(−) Taxa Eduzz', -eduzz, 'red', `${n} × R$ ${T.eduzzFixo.toFixed(2)} + ${(T.eduzzPct*100).toFixed(1)}% de (${brl(fat)} − ${n}×R$ ${T.eduzzFixo.toFixed(2)})`],
    ['(−) Imposto', -imposto, 'red', `${(T.impostoPct*100).toFixed(0)}% sobre ${brl(baseProd)} (valor do produto)`],
    ['= Líquido de vendas', liquidoVendas, liquidoVendas>=0?'green':'red', ''],
    ['(−) SellFlux', -custoSellflux, 'red', `R$ ${T.sellfluxMes} × ${meses} ${meses>1?'ciclos':'ciclo'}`],
    ['(−) Emissão de nota', -custoNota, 'red', `R$ ${T.notaMes} × ${meses} ${meses>1?'ciclos':'ciclo'}`],
    ['= Líquido do período', liquido, liquido>=0?'green':'red', 'antes da mídia'],
    ['(−) Investimento em mídia', -invest, 'orange', 'reinvestido em anúncios'],
    ['= Saldo (cresce o bolo)', saldo, saldo>=0?'green':'red', 'soma ao bolo'],
  ];
  h+=`<div class="sec-title">Cascata do período</div><div class="tbl-wrap"><table><thead><tr>
    <th>Linha</th><th>Detalhe</th><th>Valor</th></tr></thead><tbody>`;
  linhas.forEach(l=>{ const bold=l[0].startsWith('=')?'font-weight:700':'';
    h+=`<tr><td style="${bold}">${l[0]}</td><td style="text-align:left;color:rgba(255,255,255,.4);font-size:10px">${l[3]}</td>
    <td class="${l[2]}" style="${bold}">${brl(l[1])}</td></tr>`; });
  h+=`</tbody></table></div>`;

  // Bolo por ciclo (toda a base)
  h+=`<div class="sec-title">Bolo por ciclo (fechamento dia 19)</div><div class="tbl-wrap"><table><thead><tr>
    <th>Vence</th><th>Período</th><th>Bruto</th><th>Eduzz</th><th>Imposto</th><th>Ferr.</th><th>Mídia</th><th>Cresc. ciclo</th><th>Bolo acum.</th></tr></thead><tbody>`;
  cycles.forEach(o=>{ h+=`<tr><td style="font-weight:600">${fmtFull(o.c)}</td>
    <td style="text-align:left;color:rgba(255,255,255,.5);font-size:10px">${fmtD(o.ini)} → ${fmtD(o.fim)}</td>
    <td>${brl(o.fat)}</td><td class="red">${brl(-o.eduzz)}</td><td class="red">${brl(-o.imposto)}</td>
    <td class="red">${brl(-o.ferr)}</td><td class="orange">${brl(-o.inv)}</td>
    <td class="${o.cresc>=0?'green':'red'}">${brl(o.cresc)}</td>
    <td class="${o.bolo>=0?'green':'red'}" style="font-weight:700">${brl(o.bolo)}</td></tr>`; });
  if(!cycles.length) h+=`<tr><td colspan="9" style="text-align:center;color:rgba(255,255,255,.3)">Sem dados</td></tr>`;
  h+=`</tbody></table></div>`;

  // Divisão sociedade
  h+=`<div class="sec-title">Divisão da sociedade ${Math.round(pctS*100)}/${Math.round((1-pctS)*100)} (sobre o saldo do período, quando positivo)</div>
  <div class="split-grid">
    <div class="split-card"><h4>Sócio A (${Math.round(pctS*100)}%)</h4><div class="split-val">${brl(saldo>0?saldo*pctS:0)}</div>
      <div class="split-sub">Parte do saldo do período</div></div>
    <div class="split-card"><h4>Sócio B (${Math.round((1-pctS)*100)}%)</h4><div class="split-val">${brl(saldo>0?saldo*(1-pctS):0)}</div>
      <div class="split-sub">Parte do saldo do período</div></div>
  </div>
  <div class="ob-info">📌 Modelo do bolo: o líquido é <b>reinvestido</b> a cada ciclo (fecha dia 19) para o bolo crescer; o saque acontece quando entram os cursos maiores.
  Hoje o histórico só tem o produto base (SOS Preciosa), por isso o saldo ainda soma ao bolo sem saque.
  Quando você definir os produtos de saque, separo aqui <i>reinvestido</i> vs <i>disponível para saque</i>. Taxas/custos editáveis em <b>CONFIG.TAXAS</b>.</div>`;
  document.getElementById('caixa').innerHTML=h;
}

// ── ABA SIMULADOR ──────────────────────────────────────────────────
let SIM_BUILT=false;
function renderSimulador(){
  const el=document.getElementById('simulador'); if(!el) return;
  if(!SIM_BUILT){
    el.innerHTML=`
    <div class="caixa-banner">🔮 <b>Simulador de aporte</b> — o valor aportado fica no negócio (vira anúncio → gera líquido → o caixa cresce, nada é sacado). Projeta vendas, caixa final e crescimento a partir da economia unitária atual. Ajuste os campos para ver cenários.</div>
    <div class="cri-filterbar" style="gap:16px">
      <div><div class="cri-metric-label">Aporte / investimento (R$)</div>
        <input type="number" id="sim-invest" class="date-input" value="2000" min="0" step="100" oninput="simRecompute()" style="min-width:130px"></div>
      <div><div class="cri-metric-label">CAC (R$/venda)</div>
        <input type="number" id="sim-cac" class="date-input" value="" step="0.5" oninput="simRecompute()" style="min-width:120px" placeholder="auto"></div>
      <div><div class="cri-metric-label">Ciclos (meses)</div>
        <input type="number" id="sim-ciclos" class="date-input" value="1" min="1" step="1" oninput="simRecompute()" style="min-width:90px"></div>
    </div>
    <div id="sim-results"></div>`;
    SIM_BUILT=true;
  }
  simRecompute();
}
function simRecompute(){
  const T=CONFIG.TAXAS;
  const traf=SALES.filter(s=>s.traf);
  const totInv=DIAS.reduce((a,d)=>a+d.inv,0);
  const nv=traf.length;
  const ticket = nv? traf.reduce((a,s)=>a+s.fatTotal,0)/nv : 0;
  const prod   = nv? traf.reduce((a,s)=>a+s.valorProduto,0)/nv : 0;
  const baseCac= nv? totInv/nv : 0;
  const elI=document.getElementById('sim-invest'), elC=document.getElementById('sim-cac'), elN=document.getElementById('sim-ciclos');
  if(!elI) return;
  if(elC && elC.placeholder!==undefined) elC.placeholder=baseCac?('auto: '+baseCac.toFixed(2)):'auto';
  const invest=parseFloat(elI.value)||0;
  const cac=(parseFloat(elC.value)||baseCac);
  const ciclos=Math.max(parseInt(elN.value)||1,1);
  const eduzzV=T.eduzzFixo+(ticket-T.eduzzFixo)*T.eduzzPct;
  const impV=prod*T.impostoPct;
  const liqV=ticket-eduzzV-impV;
  const vendas=cac? invest/cac : 0;
  const bruto=vendas*ticket;
  const liqVendas=vendas*liqV;
  const ferr=(T.sellfluxMes+T.notaMes)*ciclos;
  const bolo=liqVendas-ferr;          // aporte vira anúncio e volta como líquido: fica no negócio
  const lucro=bolo-invest;            // crescimento sobre o aporte
  const roas=invest? bruto/invest : 0;
  const pctS=CONFIG.SPLIT_SOCIO_PCT;

  const eco=[
    ['CAC base (dados atuais)',brl(baseCac),'orange'],
    ['Ticket bruto médio',brl(ticket),'green'],
    ['Líquido por venda',brl(liqV),'green'],
    ['Margem por venda (− CAC)',brl(liqV-cac),(liqV-cac)>=0?'green':'red'],
  ];
  const proj=[
    ['Vendas estimadas',Math.round(vendas),'blue',cac?('CAC R$ '+cac.toFixed(2)):''],
    ['Faturamento bruto',brl(bruto),'green',dash(roas,v=>v.toFixed(2)+'x ROAS')],
    ['Líquido de vendas',brl(liqVendas),'green','− Eduzz − imposto'],
    ['Ferramentas',brl(ferr),'red',ciclos+(ciclos>1?' ciclos':' ciclo')],
    ['Aporte (fica no negócio)',brl(invest),'orange','não é sacado'],
    ['Caixa final (bolo)',brl(bolo),bolo>=0?'green':'red','líquido − ferramentas'],
    ['Crescimento sobre o aporte',brl(lucro),lucro>=0?'green':'red',dash(invest?lucro/invest*100:0,v=>'+'+v.toFixed(0)+'%')],
  ];
  let h=`<div class="sec-title">Economia unitária (base atual)</div>
  <div class="kpi-grid">${eco.map(k=>`<div class="kpi-card"><div class="kpi-label">${k[0]}</div><div class="kpi-value ${k[2]}">${k[1]}</div></div>`).join('')}</div>`;
  h+=`<div class="sec-title">Projeção com R$ ${invest.toLocaleString('pt-BR')} investido</div>
  <div class="kpi-grid">${proj.map(k=>`<div class="kpi-card"><div class="kpi-label">${k[0]}</div><div class="kpi-value ${k[2]}">${k[1]}</div>${k[3]?`<div class="kpi-sub">${k[3]}</div>`:''}</div>`).join('')}</div>`;
  h+=`<div class="split-grid">
    <div class="split-card"><h4>Patrimônio Sócio A (${Math.round(pctS*100)}%)</h4><div class="split-val">${brl(bolo>0?bolo*pctS:0)}</div><div class="split-sub">parte do bolo (não sacado)</div></div>
    <div class="split-card"><h4>Patrimônio Sócio B (${Math.round((1-pctS)*100)}%)</h4><div class="split-val">${brl(bolo>0?bolo*(1-pctS):0)}</div><div class="split-sub">parte do bolo (não sacado)</div></div>
  </div>
  <div class="ob-info">💡 O aporte fica no negócio: vira anúncio, gera líquido e o caixa cresce — nada é sacado. Projeção linear sobre a economia unitária atual (amostra pequena); o CAC tende a subir ao escalar, ajuste o campo <b>CAC</b> para cenários conservadores. Ferramentas contadas por nº de ciclos.</div>`;
  document.getElementById('sim-results').innerHTML=h;
}
