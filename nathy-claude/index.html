<script>
const SHEET_ID='1rlmZP2ycdx2TNxNIWr7sriHR_7BdNbBIEdwhbgtEgDY';
const SHEET_CAP='Cap', SHEET_WEBHOOK='Webhook';
// Leads contados manualmente no grupo (pixel nao registrou) - rateados proporcional ao investimento do dia.
// Para atualizar: edite as datas/valores abaixo. Sao SOMADOS aos leads atribuidos via UTM.
const MANUAL_LEADS={'2026-05-12':9,'2026-05-13':21,'2026-05-14':14};
const fmtBR=v=>'R$ '+(v||0).toFixed(2).replace('.',',').replace(/\B(?=(\d{3})+(?!\d))/g,'.');
const fmtInt=v=>(v||0).toLocaleString('pt-BR');
const fmtPct=v=>(v||0).toFixed(2).replace('.',',')+'%';
const fmtLeads=v=>{const n=Math.round((v||0)*10)/10;return Number.isInteger(n)?String(n):n.toFixed(1).replace('.',',');};
function parseBR(s){if(s==null)return 0;return parseFloat(String(s).replace(/\./g,'').replace(',','.'))||0;}
function parseCSV(t){const rows=[];let cur=[],f='',q=false;for(let i=0;i<t.length;i++){const c=t[i];if(q){if(c==='"'&&t[i+1]==='"'){f+='"';i++;}else if(c==='"'){q=false;}else{f+=c;}}else{if(c==='"'){q=true;}else if(c===','){cur.push(f);f='';}else if(c==='\n'){cur.push(f);rows.push(cur);cur=[];f='';}else if(c==='\r'){}else{f+=c;}}}if(f.length||cur.length){cur.push(f);rows.push(cur);}return rows;}
function rowsToObjects(rows){if(!rows.length)return [];const h=rows[0].map(x=>x.trim());const out=[];for(let i=1;i<rows.length;i++){const r=rows[i];if(r.length===1&&!r[0])continue;const o={};h.forEach((hh,idx)=>{o[hh]=(r[idx]||'').trim();});out.push(o);}return out;}
async function fetchSheet(name){const cb=Date.now()+'_'+Math.random().toString(36).slice(2);const url=`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(name)}&headers=1&_cb=${cb}`;const r=await fetch(url,{cache:'no-store',headers:{'Cache-Control':'no-cache, no-store, max-age=0','Pragma':'no-cache'}});if(!r.ok)throw new Error(`HTTP ${r.status} ao ler aba "${name}"`);const t=await r.text();if(t.includes('<HTML>')||t.includes('signin'))throw new Error(`Aba "${name}" não acessível. Habilite "Qualquer pessoa com o link" em Compartilhar.`);return rowsToObjects(parseCSV(t));}
function computeMetrics(cap,webhook){
  const leads=webhook.filter(r=>{const s=(r['UTM Source']||'').toLowerCase().trim();const st=(r['Status']||'').toLowerCase().trim();return s==='meta_ads'&&st.includes('pag');});
  function wdk(s){const m=String(s||'').match(/^(\d{2})\/(\d{2})\/(\d{4})/);return m?`${m[3]}-${m[2]}-${m[1]}`:null;}
  const byDate={},byAdset={},byCreative={},byDateAdset={};
  let totals={spend:0,imp:0,cli:0,pv:0,v3s:0};
  cap.forEach(r=>{
    const date=r['Date'],adset=r['Adset Name'],crt=r['Ad Name'];
    if(!date||!adset||!crt)return;
    const spend=parseBR(r['Spend (Cost, Amount Spent)']),imp=parseBR(r['Impressions']),cli=parseBR(r['Action Link Clicks']),pv=parseBR(r['Action Landing Page View']),v3s=parseBR(r['Action 3s Video Views']),url=r['Instagram Permalink URL']||'';
    totals.spend+=spend;totals.imp+=imp;totals.cli+=cli;totals.pv+=pv;totals.v3s+=v3s;
    if(!byDate[date])byDate[date]={date,spend:0,imp:0,cli:0,pv:0,leads:0};
    byDate[date].spend+=spend;byDate[date].imp+=imp;byDate[date].cli+=cli;byDate[date].pv+=pv;
    if(!byAdset[adset])byAdset[adset]={adset,spend:0,imp:0,cli:0,pv:0,leads:0,leadsFeed:0,leadsStories:0,leadsReels:0,leadsManual:0};
    byAdset[adset].spend+=spend;byAdset[adset].imp+=imp;byAdset[adset].cli+=cli;byAdset[adset].pv+=pv;
    if(!byCreative[crt])byCreative[crt]={crt,adset,url,spend:0,imp:0,cli:0,pv:0,leads:0,v3s:0};
    byCreative[crt].spend+=spend;byCreative[crt].imp+=imp;byCreative[crt].cli+=cli;byCreative[crt].pv+=pv;byCreative[crt].v3s+=v3s;
    if(url)byCreative[crt].url=url;
    if(adset)byCreative[crt].adset=adset;
    const k=`${date}|${adset}`;
    if(!byDateAdset[k])byDateAdset[k]={date,adset,crt,spend:0,imp:0,cli:0,pv:0,leads:0};
    byDateAdset[k].spend+=spend;byDateAdset[k].imp+=imp;byDateAdset[k].cli+=cli;byDateAdset[k].pv+=pv;
  });
  let lbp={feed:0,stories:0,reels:0,other:0};
  leads.forEach(l=>{
    const date=wdk(l['Data de Criação']),adset=(l['UTM Term']||'').trim(),crt=(l['UTM Content']||'').trim(),pl=(l['UTM Medium']||'').toLowerCase();
    if(date&&byDate[date])byDate[date].leads++;
    if(adset&&byAdset[adset]){byAdset[adset].leads++;if(pl.includes('feed'))byAdset[adset].leadsFeed++;else if(pl.includes('stor'))byAdset[adset].leadsStories++;else if(pl.includes('reel'))byAdset[adset].leadsReels++;}
    if(crt&&byCreative[crt])byCreative[crt].leads++;
    const ck=`${date}|${adset}`;if(byDateAdset[ck])byDateAdset[ck].leads++;
    if(pl.includes('feed'))lbp.feed++;else if(pl.includes('stor'))lbp.stories++;else if(pl.includes('reel'))lbp.reels++;else lbp.other++;
  });
  // Leads manuais do grupo (pixel nao registrou) - rateio proporcional ao investimento do dia
  let manualTotal=0;
  Object.keys(MANUAL_LEADS).forEach(date=>{
    const dl=MANUAL_LEADS[date];if(!dl)return;
    manualTotal+=dl;
    if(!byDate[date])byDate[date]={date,spend:0,imp:0,cli:0,pv:0,leads:0};
    byDate[date].leads+=dl;
    const dayRows=cap.filter(r=>r['Date']===date);
    const daySpend=dayRows.reduce((s,r)=>s+parseBR(r['Spend (Cost, Amount Spent)']),0);
    if(daySpend>0){
      const adsetSp={};
      dayRows.forEach(r=>{const a=r['Adset Name'];if(a)adsetSp[a]=(adsetSp[a]||0)+parseBR(r['Spend (Cost, Amount Spent)']);});
      Object.keys(adsetSp).forEach(a=>{const alloc=dl*(adsetSp[a]/daySpend);if(byAdset[a]){byAdset[a].leads+=alloc;byAdset[a].leadsManual+=alloc;}const k=date+'|'+a;if(byDateAdset[k])byDateAdset[k].leads+=alloc;});
      dayRows.forEach(r=>{const crt=r['Ad Name'],sp=parseBR(r['Spend (Cost, Amount Spent)']);if(crt&&byCreative[crt])byCreative[crt].leads+=dl*(sp/daySpend);});
    }
  });
  const tl=leads.length+manualTotal;totals.leads=tl;
  totals.ctr=totals.imp>0?totals.cli/totals.imp*100:0;
  totals.cpc=totals.cli>0?totals.spend/totals.cli:0;
  totals.cpm=totals.imp>0?totals.spend/totals.imp*1000:0;

  chartInstances.push(new Chart(document.getElementById('dailyChart').getContext('2d'),{type:'bar',data:{labels:m.dateList.map(d=>fmtDateBR(d.date).slice(0,5)),datasets:[{label:'Leads',type:'bar',data:m.dateList.map(d=>d.leads),backgroundColor:'rgba(0,200,83,0.6)',borderColor:'#00c853',borderWidth:2,yAxisID:'y',order:2},{label:'CPL (R$)',type:'line',data:m.dateList.map(d=>d.cpl||0),borderColor:'#ff6b35',backgroundColor:'#ff6b35',borderWidth:3,tension:0.3,yAxisID:'y1',pointRadius:6,order:1}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:'#fff'}},title:{display:true,text:'Leads × CPL por dia',color:'#fff',font:{size:14,weight:'700'}}},scales:{y:{type:'linear',position:'left',beginAtZero:true,title:{display:true,text:'Leads',color:'#00c853'},grid:{color:'#3a1a0a'}},y1:{type:'linear',position:'right',beginAtZero:true,title:{display:true,text:'CPL (R$)',color:'#ff6b35'},grid:{display:false}},x:{grid:{color:'#3a1a0a'}}}}}));
  chartInstances.push(new Chart(document.getElementById('comparativoChart').getContext('2d'),{type:'line',data:{labels:m.dateList.map(d=>fmtDateBR(d.date).slice(0,5)),datasets:[{label:'Investimento (R$)',data:m.dateList.map(d=>d.spend),borderColor:'#ff6b35',backgroundColor:'rgba(255,107,53,0.15)',borderWidth:3,tension:0.3,fill:true,yAxisID:'y'},{label:'Cliques',data:m.dateList.map(d=>d.cli),borderColor:'#d97706',backgroundColor:'transparent',borderWidth:3,tension:0.3,yAxisID:'y1'},{label:'Page Views',data:m.dateList.map(d=>d.pv),borderColor:'#ffd600',backgroundColor:'transparent',borderWidth:3,tension:0.3,yAxisID:'y1'},{label:'Leads',data:m.dateList.map(d=>d.leads),borderColor:'#00c853',backgroundColor:'transparent',borderWidth:3,tension:0.3,yAxisID:'y1'}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:'#fff'}},title:{display:true,text:'Evolução de Investimento, Cliques, PV e Leads',color:'#fff',font:{size:14,weight:'700'}}},scales:{y:{type:'linear',position:'left',beginAtZero:true,title:{display:true,text:'Investimento (R$)',color:'#ff6b35'},grid:{color:'#3a1a0a'}},y1:{type:'linear',position:'right',beginAtZero:true,title:{display:true,text:'Volume',color:'#d97706'},grid:{display:false}},x:{grid:{color:'#3a1a0a'}}}}}));
}
async function loadDashboard(){
  document.getElementById('appRoot').innerHTML=`<div class="loader"><div class="loader-spinner"></div><div class="loader-text">Puxando dados da planilha CL33 — Nathy Claude...</div></div>`;
  try{
    const [cap,webhook]=await Promise.all([fetchSheet(SHEET_CAP),fetchSheet(SHEET_WEBHOOK)]);
    if(!cap.length)throw new Error('Aba "Cap" sem dados.');
    const m=computeMetrics(cap,webhook);
    render(m);
  }catch(err){
    document.getElementById('appRoot').innerHTML=`<div class="error-box"><strong>Erro ao carregar dados:</strong><br>${(err&&err.message)||err}<br><br><small>Verifique se a planilha está com "Qualquer pessoa com o link" (visualização) habilitado em Compartilhar.</small></div>`;
    console.error(err);
  }
}
document.getElementById('reloadBtn').addEventListener('click',loadDashboard);
loadDashboard();
setInterval(loadDashboard,5*60*1000);
</script>
