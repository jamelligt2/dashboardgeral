<link rel="preconnect" href="https://fonts.googleapis.com">

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#1a1a2e;color:#e8e6f0;font-family:'DM Sans',sans-serif;min-height:100vh}
::-webkit-scrollbar{width:6px;height:6px}::-webkit-scrollbar-track{background:#12121f}::-webkit-scrollbar-thumb{background:#ff6b2b55;border-radius:3px}
.topbar{background:#12121f;padding:12px 28px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(255,255,255,0.07);position:sticky;top:0;z-index:100;flex-wrap:wrap;gap:10px}
.brand{font-size:17px;font-weight:700;color:#ff6b2b}
.subtitle{font-size:11px;color:rgba(255,255,255,0.4);margin-top:2px}
.logo-jgt{display:flex;align-items:center;gap:10px}
.logo-jgt svg{width:36px;height:36px;flex-shrink:0}
.logo-text{display:flex;flex-direction:column}
.logo-text strong{font-size:13px;font-weight:700;color:#ff6b2b;letter-spacing:.3px}
.logo-text span{font-size:10px;color:rgba(255,255,255,.35);margin-top:1px}
.period-bar{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.period-bar label{font-size:11px;color:rgba(255,255,255,.45);white-space:nowrap}
.date-input{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.15);color:#e8e6f0;padding:5px 10px;border-radius:6px;font-size:12px;font-family:'DM Sans',sans-serif;cursor:pointer;outline:none;min-width:118px}
.date-input:focus{border-color:#ff6b2b}
.date-input::-webkit-calendar-picker-indicator{filter:invert(1);opacity:.5;cursor:pointer}
.period-sep{color:rgba(255,255,255,.2);font-size:13px;padding:0 2px}
.preset-btn{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);color:rgba(255,255,255,.6);padding:5px 12px;border-radius:6px;cursor:pointer;font-size:12px;font-family:'DM Sans',sans-serif;transition:all .2s;white-space:nowrap}
.preset-btn:hover,.preset-btn.active{background:rgba(255,107,43,.2);border-color:#ff6b2b;color:#ff6b2b;font-weight:600}
.range-info{font-size:11px;color:rgba(255,107,43,.75);font-family:'DM Mono',monospace;white-space:nowrap;padding-left:4px}
.tabs{display:flex;border-bottom:1px solid rgba(255,255,255,0.07);background:#12121f;padding:0 28px;overflow-x:auto}
.tab{padding:12px 20px;cursor:pointer;font-size:13px;color:rgba(255,255,255,0.5);border-bottom:2px solid transparent;transition:all .2s;white-space:nowrap}
.tab:hover{color:#e8e6f0}.tab.active{color:#ff6b2b;border-bottom-color:#ff6b2b;font-weight:600}
.content{padding:24px 28px;display:none}.content.active{display:block}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(155px,1fr));gap:12px;margin-bottom:20px}
.kpi-card{background:#12121f;border:1px solid rgba(255,255,255,0.07);border-radius:10px;padding:16px 18px}
.kpi-label{font-size:10px;color:rgba(255,255,255,0.4);text-transform:uppercase;letter-spacing:.6px;margin-bottom:6px}
.kpi-value{font-size:20px;font-weight:700;font-family:'DM Mono',monospace}
.kpi-sub{font-size:10px;color:rgba(255,255,255,.35);margin-top:4px;font-family:'DM Sans',sans-serif}
.orange{color:#ff6b2b}.green{color:#2ecc71}.red{color:#e74c3c}.yellow{color:#f1c40f}
table{width:100%;border-collapse:collapse;font-size:12px}
th{background:#12121f;color:rgba(255,255,255,.45);padding:8px 10px;text-align:right;font-weight:500;border-bottom:1px solid rgba(255,255,255,.07);white-space:nowrap}
th:first-child{text-align:left}
td{padding:7px 10px;text-align:right;border-bottom:1px solid rgba(255,255,255,.04);font-family:'DM Mono',monospace;font-size:11px;color:#e8e6f0}
td:first-child{text-align:left;font-family:'DM Sans',sans-serif;font-size:12px}
tr:hover td{background:rgba(255,255,255,.025)}
.funil-section{display:grid;grid-template-columns:1fr 1fr;gap:24px;margin:16px 0}
.funil-bar-wrap{margin-bottom:12px}
.funil-label{display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px;color:rgba(255,255,255,.7)}
.funil-bar-bg{background:rgba(255,255,255,.05);border-radius:4px;height:14px;overflow:hidden}
.funil-bar-fill{background:linear-gradient(90deg,#ff6b2b,#ff9a3c);height:100%;border-radius:4px;transition:width .4s}
.taxa-grid{display:grid;gap:8px}
.taxa-item{background:rgba(255,255,255,.04);border-radius:8px;padding:12px 14px;display:flex;justify-content:space-between;align-items:center;font-size:12px;color:rgba(255,255,255,.7)}
.taxa-val{font-family:'DM Mono',monospace;font-size:15px;font-weight:600;color:#ff6b2b}
.chart-grid-2x2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin:16px 0}
.chart-card{background:#12121f;border:1px solid rgba(255,255,255,.07);border-radius:10px;padding:16px}
.chart-card h4{font-size:11px;color:rgba(255,255,255,.45);margin-bottom:10px;text-transform:uppercase;letter-spacing:.5px}
.chart-card canvas{max-height:220px}
.sec-title{font-size:13px;font-weight:600;color:rgba(255,255,255,.65);margin:20px 0 10px;border-left:3px solid #ff6b2b;padding-left:10px}
.cri-filterbar{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.cri-filter-btn,.cri-sort-btn{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);color:rgba(255,255,255,.6);padding:5px 12px;border-radius:5px;cursor:pointer;font-size:12px;transition:all .2s;font-family:'DM Sans',sans-serif}
.cri-filter-btn.active,.cri-sort-btn.active{background:rgba(255,107,43,.2);border-color:#ff6b2b;color:#ff6b2b}
.cri-sort-label{font-size:11px;color:rgba(255,255,255,.4);white-space:nowrap}
.cri-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:24px}
.cri-card{background:#12121f;border:1px solid rgba(255,255,255,.07);border-radius:10px;padding:14px}
.cri-card.ativo{border-color:rgba(46,204,113,.25)}
.cri-card-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.cri-name{font-size:12px;font-weight:600;word-break:break-word;flex:1;margin-right:6px;color:#e8e6f0}
.cri-badge{font-size:10px;padding:2px 6px;border-radius:4px;white-space:nowrap}
.cri-badge.ativo{background:rgba(46,204,113,.15);color:#2ecc71}
.cri-badge.inativo{background:rgba(255,255,255,.08);color:rgba(255,255,255,.4)}
.cri-metrics{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.cri-metric{display:flex;flex-direction:column}
.cri-metric-label{color:rgba(255,255,255,.4);font-size:9px;margin-bottom:2px;text-transform:uppercase}
.cri-metric-val{font-family:'DM Mono',monospace;font-size:12px;font-weight:600;color:#e8e6f0}
.cri-metric-val.hl{color:#ff6b2b;font-size:14px}
.cri-link{display:block;margin-top:8px;font-size:10px;color:rgba(255,107,43,.7);text-decoration:none;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tbl-wrap{overflow-x:auto;border-radius:8px;border:1px solid rgba(255,255,255,.07)}
.ob-info{background:rgba(255,107,43,.07);border:1px solid rgba(255,107,43,.2);border-radius:8px;padding:10px 14px;font-size:11px;color:rgba(255,255,255,.55);margin-bottom:16px;line-height:1.5}
.empty{padding:40px;text-align:center;color:rgba(255,255,255,.35);font-size:13px}

@media(max-width:600px){.cri-grid{grid-template-columns:1fr}.chart-grid-2x2{grid-template-columns:1fr}.funil-section{grid-template-columns:1fr}}

</head>

// ── Helpers ───────────────────────────────────────────────────────
function brNum(s){
  s=String(s==null?'':s).replace(/[^0-9,.\-]/g,'');
  if(!s) return 0;
  if(s.indexOf(',')>=0){ s=s.replace(/\./g,'').replace(',','.'); }
  else { s=s.replace(/\./g,''); }
  const n=parseFloat(s); return isNaN(n)?0:n;
}
function normDate(s){
  s=String(s==null?'':s).trim();
  let m=s.match(/^(\d{4})-(\d{1,2})-(\d{1,2})/);
  if(m) return m[1]+'-'+m[2].padStart(2,'0')+'-'+m[3].padStart(2,'0');
  m=s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})/);
  if(m) return m[3]+'-'+m[2].padStart(2,'0')+'-'+m[1].padStart(2,'0');
  return '';
}
const money=v=>'R$ '+(v||0).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});
const num=v=>(v||0).toLocaleString('pt-BR');
const pct=v=>(isFinite(v)&&v?((v).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2})+'%'):'—');
const dec=(v,d=2)=>(isFinite(v)&&v?v.toLocaleString('pt-BR',{minimumFractionDigits:d,maximumFractionDigits:d}):'—');
const dash=v=>(v?v:'—');
function fmtD(iso){const p=(iso||'').split('-');return p.length===3?p[2]+'/'+p[1]:iso;}

// ── CSV parser ────────────────────────────────────────────────────
function parseCSV(text){
  const rows=[];let row=[],cur='',q=false;
  for(let i=0;i<text.length;i++){
    const c=text[i];
    if(q){
      if(c==='"'){ if(text[i+1]==='"'){cur+='"';i++;} else q=false; }
      else cur+=c;
    } else {
      if(c==='"') q=true;
      else if(c===','){row.push(cur);cur='';}
      else if(c==='\n'){row.push(cur);rows.push(row);row=[];cur='';}
      else if(c==='\r'){}
      else cur+=c;
    }
  }
  if(cur!==''||row.length){row.push(cur);rows.push(row);}
  return rows;
}

// Carrega aba via gviz JSON usando <script> (JSONP) — imune a CORS e a file://
function fetchSheetJSONP(sheetName){
  return new Promise((resolve,reject)=>{
    const cb='__gviz_'+Date.now()+'_'+Math.floor(Math.random()*1e6);
    const url=`https://docs.google.com/spreadsheets/d/${CONFIG.SHEET_ID}/gviz/tq?tqx=out:json;responseHandler:${cb}&sheet=${encodeURIComponent(sheetName)}`;
    let s=null, done=false;
    const to=setTimeout(()=>{ if(!done){done=true;cleanup();reject(new Error('timeout'));} },15000);
    function cleanup(){ clearTimeout(to); try{delete window[cb];}catch(e){window[cb]=undefined;} if(s&&s.parentNode) s.parentNode.removeChild(s); }
    window[cb]=function(resp){ if(done) return; done=true; cleanup(); resolve(resp); };
    s=document.createElement('script');
    s.src=url;
    s.onerror=function(){ if(!done){done=true;cleanup();reject(new Error('script error'));} };
    document.head.appendChild(s);
  });
}

// Converte uma célula gviz para valor JS (número fica número, data vira YYYY-MM-DD)
function cellVal(c){
  if(c==null) return '';
  let v=c.v;
  if(v==null) return '';
  if(typeof v==='string' && v.indexOf('Date(')===0){
    const m=v.match(/Date\((\d+),(\d+),(\d+)/);
    if(m) return m[1]+'-'+String(+m[2]+1).padStart(2,'0')+'-'+String(+m[3]).padStart(2,'0');
    return c.f!=null?String(c.f):v;
  }
  return v;
}

// Retorna linhas de dados (sem cabeçalho). Tenta ao vivo; se falhar usa snapshot.
async function getSheetRows(sheetName){
  try{
    const resp=await fetchSheetJSONP(sheetName);
    if(!resp||resp.status==='error'||!resp.table||!resp.table.rows) throw new Error('sem tabela');
    return resp.table.rows.map(row=>(row.c||[]).map(cellVal));
  }catch(e){
    USED_FALLBACK=true;
    const key=(sheetName===CONFIG.GERENCIADOR_SHEET)?'gerenciador':'resumo';
    return parseCSV(EMBED_CSV[key]).slice(1);
  }
}

// Número universal: gviz já entrega number; snapshot CSV entrega string BR
function toNum(x){ return (typeof x==='number')?x:brNum(x); }

// ── Date range ────────────────────────────────────────────────────
function allDates(){ return [...RESUMO.map(d=>d.data),...GROWS.map(g=>g.data)].filter(Boolean).sort(); }
function initDateRange(){
  const d=allDates(); if(!d.length) return;
  document.getElementById('dateFrom').value=d[0];
  document.getElementById('dateTo').value=d[d.length-1];
  updateRangeInfo();
}
function updateRangeInfo(){
  const f=document.getElementById('dateFrom').value, t=document.getElementById('dateTo').value;
  const el=document.getElementById('range-info');
  if(el) el.textContent=(f&&t)?(fmtD(f)+' → '+fmtD(t)):'';
}
function getRange(){ return {from:document.getElementById('dateFrom').value, to:document.getElementById('dateTo').value}; }
function inRange(d,f,t){ return (!f||d>=f)&&(!t||d<=t); }
function onDateChange(){ updateRangeInfo(); document.querySelectorAll('.preset-btn').forEach(b=>b.classList.remove('active')); renderAll(); }
function setPreset(days,btn){
  document.querySelectorAll('.preset-btn').forEach(b=>b.classList.remove('active'));
  if(btn) btn.classList.add('active');
  const d=allDates(); if(!d.length) return;
  const first=d[0], last=d[d.length-1];
  if(days==='all'){
    document.getElementById('dateFrom').value=first;
    document.getElementById('dateTo').value=last;
  } else {
    const end=new Date(last+'T00:00:00');
    const start=new Date(end); start.setDate(start.getDate()-(days-1));
    const iso=x=>x.toISOString().slice(0,10);
    const s=iso(start)<first?first:iso(start);
    document.getElementById('dateFrom').value=s;
    document.getElementById('dateTo').value=last;
  }
  updateRangeInfo(); renderAll();
}

// ── Agregações ────────────────────────────────────────────────────
function resumoFiltered(){ const {from,to}=getRange(); return RESUMO.filter(r=>inRange(r.data,from,to)); }
function growsFiltered(){ const {from,to}=getRange(); return GROWS.filter(g=>inRange(g.data,from,to)); }

function totals(rows){
  const t={inv:0,imp:0,clk:0,pv:0,ck:0,vendas:0,fat:0};
  rows.forEach(r=>{t.inv+=r.inv;t.imp+=r.imp;t.clk+=r.clk;t.pv+=r.pv;t.ck+=r.ck;t.vendas+=r.vendas;t.fat+=r.fat;});
  t.roas=t.inv?t.fat/t.inv:0;
  t.ctr=t.imp?t.clk/t.imp*100:0;
  t.cpc=t.clk?t.inv/t.clk:0;
  t.cpm=t.imp?t.inv/t.imp*1000:0;
  t.cpa=t.vendas?t.inv/t.vendas:0;
  t.ticket=t.vendas?t.fat/t.vendas:0;
  return t;
}

// agrupa GROWS por chave; status pega o registro de data mais recente
function groupGrows(rows,keyFn){
  const map={};
  rows.forEach(g=>{
    const k=keyFn(g); if(!k) return;
    if(!map[k]) map[k]={key:k,inv:0,imp:0,clk:0,pv:0,ck:0,reach:0,link:g.link,lastDate:'',sCamp:'',sAdset:'',sAd:''};
    const m=map[k];
    m.inv+=g.inv;m.imp+=g.imp;m.clk+=g.clk;m.pv+=g.pv;m.ck+=g.ck;m.reach+=g.reach;
    if(g.link) m.link=g.link;
    if(g.data>=m.lastDate){ m.lastDate=g.data; m.sCamp=g.sCamp; m.sAdset=g.sAdset; m.sAd=g.sAd; }
  });
  return Object.values(map).map(m=>{
    m.ctr=m.imp?m.clk/m.imp*100:0;
    m.cpc=m.clk?m.inv/m.clk:0;
    m.cpm=m.imp?m.inv/m.imp*1000:0;
    m.ativo=!(m.sCamp.includes('PAUSED')||m.sAdset.includes('PAUSED')||m.sAd.includes('PAUSED'))
            && (m.sCamp!==''||m.sAdset!==''||m.sAd!=='');
    return m;
  });
}

function renderGrupo(tab,keyFn,label){

  const ti=totals(resumoFiltered());
  const ativos=items.filter(i=>i.ativo).length;

  const mkBtn=(active,onclick,txt,clsbase)=>`<button class="${clsbase} ${active?'active':''}" onclick="${onclick}">${txt}</button>`;
  let html=`<div class="ob-info">Métricas por ${label.toLowerCase()} vêm da aba <strong>gerenciador</strong> (nível de anúncio). Faturamento e vendas são reportados de forma agregada na aba <strong>resumo</strong>, portanto não há atribuição de receita por ${label.toLowerCase()} — aqui o foco é entrega, custo e engajamento.</div>`;
  html+=`<div class="kpi-grid">
    ${kpi(label+'s',num(items.length),'orange',ativos+' ativo'+(ativos===1?'':'s'))}
    ${kpi('Investimento',money(items.reduce((s,i)=>s+i.inv,0)))}
    ${kpi('Impressões',num(items.reduce((s,i)=>s+i.imp,0)))}
    ${kpi('Cliques',num(items.reduce((s,i)=>s+i.clk,0)))}
    ${kpi('Checkouts',num(items.reduce((s,i)=>s+i.ck,0)))}
    ${kpi('CTR médio',pct((()=>{const im=items.reduce((s,i)=>s+i.imp,0),cl=items.reduce((s,i)=>s+i.clk,0);return im?cl/im*100:0;})()))}
  </div>`;

  html+=`<div class="cri-filterbar">
    ${mkBtn(st.filter==='todos',`setGrpFilter('${tab}','todos',G_KEY['${tab}'],'${label}')`,'Todos','cri-filter-btn')}
    ${mkBtn(st.filter==='ativos',`setGrpFilter('${tab}','ativos',G_KEY['${tab}'],'${label}')`,'Ativos','cri-filter-btn')}
    ${mkBtn(st.filter==='inativos',`setGrpFilter('${tab}','inativos',G_KEY['${tab}'],'${label}')`,'Inativos','cri-filter-btn')}
    <span class="cri-sort-label" style="margin-left:8px">Ordenar:</span>
    ${mkBtn(st.sort==='inv',`setGrpSort('${tab}','inv',G_KEY['${tab}'],'${label}')`,'Investimento','cri-sort-btn')}
    ${mkBtn(st.sort==='ctr',`setGrpSort('${tab}','ctr',G_KEY['${tab}'],'${label}')`,'CTR','cri-sort-btn')}
    ${mkBtn(st.sort==='cpc',`setGrpSort('${tab}','cpc',G_KEY['${tab}'],'${label}')`,'CPC','cri-sort-btn')}
    ${mkBtn(st.sort==='clk',`setGrpSort('${tab}','clk',G_KEY['${tab}'],'${label}')`,'Cliques','cri-sort-btn')}
    ${mkBtn(st.sort==='ck',`setGrpSort('${tab}','ck',G_KEY['${tab}'],'${label}')`,'Checkout','cri-sort-btn')}
  </div>`;

  // Cards
  html+=`<div class="cri-grid">`;
  items.forEach(i=>{
    const link=/^https?:\/\//.test(i.link)?`<a class="cri-link" href="${i.link}" target="_blank" rel="noopener">${i.link}</a>`:'';
    html+=`<div class="cri-card ${i.ativo?'ativo':''}">
      <div class="cri-card-header">
        <div class="cri-name">${i.key||'—'}</div>
        <span class="cri-badge ${i.ativo?'ativo':'inativo'}">${i.ativo?'Ativo':'Inativo'}</span>
      </div>
      <div class="cri-metrics">
        <div class="cri-metric"><span class="cri-metric-label">Investimento</span><span class="cri-metric-val hl">${money(i.inv)}</span></div>
        <div class="cri-metric"><span class="cri-metric-label">CTR</span><span class="cri-metric-val">${pct(i.ctr)}</span></div>
        <div class="cri-metric"><span class="cri-metric-label">Impressões</span><span class="cri-metric-val">${num(i.imp)}</span></div>
        <div class="cri-metric"><span class="cri-metric-label">Cliques</span><span class="cri-metric-val">${num(i.clk)}</span></div>
        <div class="cri-metric"><span class="cri-metric-label">CPC</span><span class="cri-metric-val">${money(i.cpc)}</span></div>
        <div class="cri-metric"><span class="cri-metric-label">Checkout</span><span class="cri-metric-val">${num(i.ck)}</span></div>
      </div>${link}
    </div>`;
  });
  html+=`</div>`;
  if(!items.length) html+=`<div class="empty">Nenhum ${label.toLowerCase()} no período / filtro selecionado.</div>`;

  // Tabela
  html+=`<div class="tbl-wrap"><table><thead><tr>
    <th>${label}</th><th>Status</th><th>Invest.</th><th>Impr.</th><th>Cliques</th><th>CTR</th><th>CPC</th><th>CPM</th><th>Page View</th><th>Checkout</th>
    </tr></thead><tbody>`;
  items.forEach(i=>{
    html+=`<tr><td>${i.key||'—'}</td><td style="text-align:left">${i.ativo?'<span class="green">● Ativo</span>':'<span style="color:rgba(255,255,255,.35)">○ Inativo</span>'}</td>
      <td>${money(i.inv)}</td><td>${num(i.imp)}</td><td>${num(i.clk)}</td><td>${pct(i.ctr)}</td><td>${money(i.cpc)}</td><td>${money(i.cpm)}</td><td>${num(i.pv)}</td><td>${num(i.ck)}</td></tr>`;
  });
  html+=`</tbody></table></div>`;

  document.getElementById(tab).innerHTML=html;
}
const G_KEY={criativos:g=>g.ad,conjuntos:g=>g.adset,campanhas:g=>g.campaign};

// ── PERÍODO (Semana / Mês) ────────────────────────────────────────
function renderPeriodo(tab,field){
  const rows=resumoFiltered();
  const map={};
  rows.forEach(r=>{
    const k=field==='semana'?r.semana:r.mes;
    if(k==='') return;
    if(!map[k]) map[k]={key:k,inv:0,imp:0,clk:0,pv:0,ck:0,vendas:0,fat:0,dias:new Set()};
    const m=map[k];
    m.inv+=r.inv;m.imp+=r.imp;m.clk+=r.clk;m.pv+=r.pv;m.ck+=r.ck;m.vendas+=r.vendas;m.fat+=r.fat;m.dias.add(r.data);
  });
  let items=Object.values(map).map(m=>{
    m.roas=m.inv?m.fat/m.inv:0; m.ctr=m.imp?m.clk/m.imp*100:0; m.cpc=m.clk?m.inv/m.clk:0;
    m.cpa=m.vendas?m.inv/m.vendas:0; m.ticket=m.vendas?m.fat/m.vendas:0;
    const ds=[...m.dias].sort(); m.ini=ds[0]; m.fim=ds[ds.length-1]; m.nDias=ds.length;
    return m;
  }).sort((a,b)=>a.key.localeCompare(b.key,undefined,{numeric:true}));

  const labelHead=field==='semana'?'Semana':'Mês';
  const keyLabel=k=>field==='semana'?('Semana '+k):(MESES[parseInt(k,10)]||('Mês '+k));

  let html='';
  if(!items.length){ document.getElementById(tab).innerHTML=`<div class="empty">Sem dados no período.</div>`; return; }

  // gráficos
  html+=`<div class="chart-grid-2x2">
    <div class="chart-card"><h4>Investimento × Faturamento</h4><canvas id="cp-${tab}-invfat"></canvas></div>
    <div class="chart-card"><h4>ROAS × CTR</h4><canvas id="cp-${tab}-roasctr"></canvas></div>
  </div>`;

  html+=`<div class="tbl-wrap"><table><thead><tr>
    <th>${labelHead}</th><th>Período</th><th>Dias</th><th>Invest.</th><th>Impr.</th><th>Cliques</th><th>CTR</th><th>CPC</th><th>Checkout</th><th>Vendas</th><th>Fat.</th><th>ROAS</th><th>CPA</th><th>Ticket</th>
    </tr></thead><tbody>`;
  items.forEach(m=>{
    html+=`<tr><td>${keyLabel(m.key)}</td><td>${fmtD(m.ini)}–${fmtD(m.fim)}</td><td>${m.nDias}</td>
      <td>${money(m.inv)}</td><td>${num(m.imp)}</td><td>${num(m.clk)}</td><td>${pct(m.ctr)}</td><td>${money(m.cpc)}</td>
      <td>${num(m.ck)}</td><td class="orange">${num(m.vendas)}</td><td>${money(m.fat)}</td>
      <td class="${m.roas>=1?'green':(m.roas>=0.6?'yellow':'red')}">${dec(m.roas)}x</td><td>${m.vendas?money(m.cpa):'—'}</td><td>${m.vendas?money(m.ticket):'—'}</td></tr>`;
  });
  html+=`</tbody></table></div>`;
  document.getElementById(tab).innerHTML=html;

  const labels=items.map(m=>keyLabel(m.key));
  mkChart(`cp-${tab}-invfat`,{type:'bar',data:{labels,datasets:[
    {label:'Investimento',data:items.map(m=>m.inv),backgroundColor:WARM[0]},
    {label:'Faturamento',data:items.map(m=>m.fat),backgroundColor:WARM[1]}
  ]},options:baseOpts(true)});
  mkChart(`cp-${tab}-roasctr`,{type:'line',data:{labels,datasets:[
    {label:'ROAS',data:items.map(m=>+m.roas.toFixed(2)),borderColor:'#ff6b2b',backgroundColor:'rgba(255,107,43,.12)',fill:true,tension:.3,yAxisID:'y',pointRadius:3},
    {label:'CTR %',data:items.map(m=>+m.ctr.toFixed(2)),borderColor:'#ffb737',backgroundColor:'rgba(255,183,55,.12)',fill:false,tension:.3,yAxisID:'y1',pointRadius:3}
  ]},options:{responsive:true,maintainAspectRatio:false,
    plugins:{legend:{display:true,labels:{color:'rgba(255,255,255,.6)',font:{size:10},boxWidth:12}}},
    scales:{x:{grid:GRID,ticks:TICK},y:{position:'left',grid:GRID,ticks:TICK,beginAtZero:true},y1:{position:'right',grid:{drawOnChartArea:false},ticks:TICK,beginAtZero:true}}}});
}

// ── Tabs ──────────────────────────────────────────────────────────
function showTab(id,el){
  document.querySelectorAll('.content').forEach(c=>c.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  if(el) el.classList.add('active');
}

loadData();
</script>
